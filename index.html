<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-title" content="東京之旅">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">
    <link rel="shortcut icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">

    <title>2026 東京賞櫻 (完整版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background-color: #F2F2F7;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .tab-btn { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.5, 1); white-space: nowrap; }
        .tab-active { background-color: #FF8BA7; color: white; box-shadow: 0 4px 12px rgba(255, 139, 167, 0.3); transform: scale(1.05); }
        .tab-inactive { background-color: white; color: #8E8E93; }

        .ios-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.2s; overflow: hidden; }
        .ios-card:active { transform: scale(0.99); }
        .timeline-line { position: absolute; left: 24px; top: 10px; bottom: -10px; width: 2px; background: #E5E5EA; z-index: 0; }

        .expand-content { transition: max-height 0.4s ease-in-out; overflow: hidden; max-height: 0; }
        .expanded { max-height: 2000px; }
        .check-circle { transition: all 0.2s; }
        .checked-bg { background-color: #34C759; border-color: #34C759; }
        
        .swiper { width: 100%; height: auto; }
        .swiper-wrapper { transition-timing-function: cubic-bezier(0.25, 0.8, 0.5, 1); }
        
        /* 儲存提示動畫 */
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(10px); } 20% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-10px); } }
        .toast-msg { animation: fadeInOut 2s forwards; }

        [x-cloak] { display: none !important; }
    </style>
</head>
