<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="東京之旅">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">
    
    <title>2026 東京賞櫻 (v25 真·除錯版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F2F2F7; padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); padding-top: calc(env(safe-area-inset-top) + 25px); padding-bottom: 15px; }
        main { padding-top: calc(env(safe-area-inset-top) + 200px); }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.2s; overflow: hidden; }
        .ios-card:active { transform: scale(0.99); }
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #FF8BA7; color: white; transform: scale(1.05); }
        .tab-inactive { background-color: white; color: #8E8E93; }
        .swiper { width: 100%; height: auto; }
        
        /* Chat & Console Styles */
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .chat-user { background: #3B82F6; color: white; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
        .chat-ai { background: #F3F4F6; color: #1F2937; border-bottom-left-radius: 4px; align-self: flex-start; margin-right: auto; }
        .chat-error { background: #FEE2E2; color: #DC2626; border: 1px solid #FECACA; }
        
        /* v25 強制顯示的黑色框框 */
        .console-box { 
            display: block; /* 強制顯示 */
            background: #1e1e1e; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            padding: 10px; 
            border-radius: 8px; 
            height: 150px; /* 高度加大 */
            overflow-y: auto; 
            margin-top: 10px; 
            border: 2px solid #333; 
            line-height: 1.4; 
            white-space: pre-wrap; 
            z-index: 9999;
        }
        .console-log { color: #aaa; }
        .console-err { color: #ff5555; font-weight: bold; border-bottom: 1px solid #ff5555; }
        .console-success { color: #55ff55; font-weight: bold; }

        .timeline-line { position: absolute; left: 24px; top: 10px; bottom: -10px; width: 2px; background: #E5E5EA; z-index: 0; }
        .expand-content { transition: max-height 0.4s ease-in-out; overflow: hidden; max-height: 0; } .expanded { max-height: 2000px; }
        .check-circle { transition: all 0.2s; } .checked-bg { background-color: #34C759; border-color: #34C759; }
        @keyframes pulse-pink { 0%, 100% { border-color: #F472B6; box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7); } 50% { border-color: #EC4899; box-shadow: 0 0 0 4px rgba(244, 114, 182, 0); } }
        .active-event-card { border-left: 4px solid #F472B6; animation: pulse-pink 2s infinite; background: #FFF5F7; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="text-slate-700" x-data="tripData()" x-init="initApp()">

    <div x-show="showToast" class="fixed top-safe-top right-4 z-[9999] bg-black/70 text-white px-4 py-2 rounded-full text-xs font-bold backdrop-blur-md flex items-center gap-2 toast-msg" style="top: calc(env(safe-area-inset-top) + 20px);" x-cloak>
        <i class="ph-bold ph-check-circle text-green-400"></i> <span x-text="toastText"></span>
    </div>

    <button @click="openChat()" class="fixed bottom-6 right-6 z-[5000] w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full shadow-xl flex items-center justify-center text-white active:scale-90 transition-transform border-4 border-white/20">
        <i class="ph-fill ph-robot text-2xl"></i>
        <div x-show="!apiKey" class="absolute top-0 right-0 w-4 h-4 bg-red-500 rounded-full border-2 border-white animate-bounce"></div>
    </button>

    <div x-show="showChatModal" x-cloak class="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm" @click.self="showChatModal = false">
        <div class="bg-white w-full h-[90vh] max-w-md rounded-3xl shadow-2xl relative flex flex-col overflow-hidden">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600"><i class="ph-fill ph-bug"></i></div>
                    <div><h3 class="font-bold text-slate-800 text-sm">Sakura Bot</h3><p class="text-[10px] text-green-500">v25 真·除錯版</p></div>
                </div>
                <div class="flex gap-2">
                    <button @click="showKeySettings = !showKeySettings" class="p-2 text-slate-400"><i class="ph-bold ph-gear"></i></button>
                    <button @click="showChatModal = false" class="p-2 text-slate-400"><i class="ph-bold ph-x"></i></button>
                </div>
            </div>

            <div x-show="showKeySettings || !apiKey" class="bg-slate-100 p-4 border-b border-slate-200 overflow-y-auto" style="max-height: 50vh;">
                <label class="text-xs font-bold text-slate-500 mb-1">Google Gemini API Key</label>
                <input type="text" x-model="apiKeyTemp" placeholder="AIza..." class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-3 bg-white outline-none">
                
                <label class="text-xs font-bold text-slate-500 mb-1">模型 ID</label>
                <input type="text" x-model="modelIdTemp" placeholder="gemini-2.5-flash" class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-3 bg-white font-mono outline-none">
                
                <button @click="checkModels()" class="w-full bg-blue-500 text-white text-xs font-bold py-2 rounded-lg mb-3 shadow"><i class="ph-bold ph-magnifying-glass"></i> 1. 偵測可用模型 (GET)</button>
                
                <div x-show="availableModels.length > 0" class="mb-3">
                    <p class="text-[10px] text-slate-500 mb-1">偵測到 (點擊套用):</p>
                    <div class="flex flex-wrap gap-1">
                        <template x-for="m in availableModels">
                            <button @click="modelIdTemp = m; saveSettings()" class="text-[10px] bg-white border border-green-200 text-green-700 px-2 py-1 rounded truncate hover:bg-green-50" :class="modelIdTemp === m ? 'bg-green-100 ring-1 ring-green-400' : ''">
                                <span x-text="m"></span>
                            </button>
                        </template>
                    </div>
                </div>

                <button @click="saveSettings()" class="bg-indigo-500 text-white text-xs font-bold px-3 py-3 rounded-lg w-full active:scale-95 transition-transform shadow-md">儲存設定</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 bg-white flex flex-col" id="chatContainer">
                <div class="flex-1 space-y-4 min-h-[100px]">
                    <div x-show="chatHistory.length === 0" class="text-center text-slate-400 text-xs mt-4">嗨！我是 AI 導遊。<br>請看下方的黑盒子紀錄。</div>
                    <template x-for="msg in chatHistory">
                        <div class="flex flex-col w-full">
                            <div class="chat-bubble shadow-sm markdown-body" 
                                 :class="[msg.role === 'user' ? 'chat-user' : 'chat-ai', msg.isError ? 'chat-error' : '']" 
                                 x-html="renderMarkdown(msg.content)"></div>
                        </div>
                    </template>
                </div>

                <div class="mt-4 border-t pt-2">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-bold text-slate-400">系統紀錄 (Logs)</span>
                        <button @click="debugLogs=[]" class="text-[10px] text-slate-400 underline">清除</button>
                    </div>
                    <div class="console-box" id="consoleBox">
                        <template x-for="log in debugLogs">
                            <div :class="log.type === 'err' ? 'console-err' : (log.type === 'ok' ? 'console-success' : 'console-log')">> <span x-text="log.msg"></span></div>
                        </template>
                        <div x-show="debugLogs.length === 0" class="text-gray-500 italic">等待操作...</div>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-slate-50 border-t border-slate-100 flex flex-col gap-2">
                <button @click="testSimpleChat()" class="w-full bg-green-500 text-white text-xs font-bold py-2 rounded-lg shadow active:scale-95 transition-transform"><i class="ph-bold ph-plugs-connected"></i> 2. 測試連線 (發送 "Hi")</button>
                <div class="flex gap-2">
                    <input type="text" x-model="chatInput" @keydown.enter="sendChat()" placeholder="輸入訊息..." class="flex-1 bg-white border rounded-full px-4 py-2 text-sm outline-none focus:border-indigo-500 transition-colors">
                    <button @click="sendChat()" :disabled="!chatInput || isAiThinking" class="w-10 h-10 bg-indigo-500 rounded-full text-white flex items-center justify-center shadow-md active:scale-95 disabled:opacity-50 disabled:scale-100 transition-all"><i class="ph-bold ph-paper-plane-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <header class="fixed top-0 inset-x-0 z-50 glass-nav">
        <div class="px-4 py-3"><div class="flex justify-between items-center mb-3"><div @click="enableSimulateMode()"><h1 class="text-xl font-bold text-slate-800">2026 東京賞櫻 (v25)</h1><p class="text-[10px] text-slate-400 font-bold uppercase">MAR 14 - 18 • 5 DAYS</p></div><div class="bg-white/80 border border-slate-100 rounded-2xl pl-3 pr-4 py-1.5 flex items-center gap-3"><div class="text-center"><i :class="getCurrentWeather().icon + ' text-2xl text-sky-500'"></i></div><div class="text-left"><div class="text-[10px] text-slate-400 font-bold"><i class="ph-bold ph-map-pin text-sky-400"></i><span x-text="getCurrentWeather().loc"></span></div><div class="text-lg font-bold text-slate-800" x-text="getCurrentWeather().temp"></div></div></div></div><div class="flex space-x-3 overflow-x-auto no-scrollbar pb-1" id="tabContainer"><button @click="slideTo(0)" id="tab-0" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 0 ? 'tab-active' : 'tab-inactive'">行前</button><button @click="slideTo(1)" id="tab-1" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 1 ? 'tab-active' : 'tab-inactive'">資訊</button><button @click="slideTo(2)" id="tab-2" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 2 ? 'tab-active bg-emerald-500' : 'tab-inactive'">記帳</button><template x-for="(day, index) in days" :key="index"><button @click="slideTo(index + 3)" :id="'tab-' + (index + 3)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === (index + 3) ? 'tab-active' : 'tab-inactive'"><span x-text="day.shortTitle"></span></button></template></div></div>
    </header>

    <main>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide px-4 pb-24"><h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3 ml-1">必備預約</h3><div class="grid gap-3 mb-8"><template x-for="ticket in prepData.tickets"><div class="ios-card p-4 flex justify-between items-center"><div><div class="font-bold text-slate-800" x-text="ticket.name"></div><div class="text-xs text-slate-400 mt-0.5" x-text="ticket.desc"></div></div><a :href="ticket.link" target="_blank" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full text-xs font-bold active:bg-slate-200">預約</a></div></template></div><div class="flex justify-between items-center mb-3 ml-1"><h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider">出發前檢查</h3><button @click="resetData()" class="text-[10px] text-slate-400 underline">重置清單</button></div><div class="ios-card overflow-hidden mb-8"><template x-for="(items, category) in prepData.luggage"><div class="border-b border-gray-100 last:border-0"><div class="bg-gray-50 px-4 py-2 text-[10px] font-bold text-slate-400 uppercase" x-text="category"></div><template x-for="item in items"><div @click="toggleCheck(item)" class="flex items-center gap-3 px-4 py-3 active:bg-gray-50 cursor-pointer"><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center check-circle" :class="item.checked ? 'checked-bg border-transparent' : 'border-gray-300'"><i x-show="item.checked" class="ph-bold ph-check text-white text-sm"></i></div><span class="text-sm font-medium text-slate-700" :class="{'line-through opacity-40': item.checked}" x-text="item.name"></span></div></template></div></template></div><div class="flex justify-between items-end mb-3 ml-1"><h3 class="text-sm font-bold text-orange-400 uppercase tracking-wider">🇯🇵 必買戰利品清單</h3><div class="flex gap-2"><button @click="exportShopping()" class="text-xs font-bold text-slate-500 bg-white border border-slate-200 px-3 py-1 rounded-full active:scale-95 transition-transform flex items-center gap-1"><i class="ph-bold ph-export"></i> 分享</button><button @click="openAddModal()" class="text-xs font-bold text-white bg-orange-400 px-3 py-1 rounded-full shadow active:scale-95 transition-transform flex items-center gap-1"><i class="ph-bold ph-plus"></i> 新增</button></div></div><div class="ios-card overflow-hidden mb-8"><template x-for="(items, category) in prepData.shopping"><div class="border-b border-gray-100 last:border-0" x-show="items.length > 0"><div class="bg-gray-50 px-4 py-2 text-[10px] font-bold text-slate-400 uppercase" x-text="category"></div><template x-for="(item, idx) in items"><div @click="toggleCheck(item)" class="flex items-center justify-between px-4 py-3 active:bg-gray-50 cursor-pointer group"><div class="flex items-center gap-3 flex-1"><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center check-circle transition-colors flex-shrink-0" :class="item.checked ? 'bg-orange-400 border-orange-400' : 'border-gray-300'"><i x-show="item.checked" class="ph-bold ph-check text-white text-sm"></i></div><div><div class="text-sm font-bold text-slate-700" :class="{'line-through opacity-40': item.checked}" x-text="item.name"></div><div class="text-[10px] text-slate-400" x-text="item.desc"></div></div></div><button @click.stop="deleteItem(category, idx)" class="p-2 text-slate-300 hover:text-red-500 transition-colors"><i class="ph-bold ph-trash"></i></button></div></template></div></template></div></div>
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 mb-6 bg-slate-800 text-white"><div class="flex items-center gap-2 mb-4"><i class="ph-fill ph-ticket text-yellow-400 text-xl"></i><h3 class="font-bold">票券收納夾</h3></div><div class="space-y-3"><template x-for="(val, key) in prepData.ticketsWallet"><div class="bg-slate-700/50 rounded-xl p-3 flex justify-between items-center"><div class="flex-1 mr-2"><div class="text-[10px] text-slate-400 uppercase font-bold" x-text="key"></div><input type="text" x-model="prepData.ticketsWallet[key]" @change="saveChecks()" placeholder="輸入代號..." class="bg-transparent w-full text-sm font-mono font-bold outline-none text-white placeholder-slate-600"></div><button @click="copyToClipboard(prepData.ticketsWallet[key])" class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center active:scale-95"><i class="ph-bold ph-copy text-slate-300"></i></button></div></template></div></div><div class="ios-card p-5 mb-6 bg-gradient-to-br from-indigo-500 to-purple-600 text-white shadow-lg"><div class="flex justify-between items-center mb-6"><div class="text-center"><div class="text-2xl font-bold">TPE</div><div class="text-xs opacity-80">台北</div></div><div class="flex-1 text-center px-4"><i class="ph-fill ph-airplane-tilt text-2xl mb-1"></i><div class="h-0.5 bg-white/30 rounded-full w-full"></div><div class="text-[10px] mt-1 opacity-80">JL0802 / JL0809</div></div><div class="text-center"><div class="text-2xl font-bold">NRT</div><div class="text-xs opacity-80">成田</div></div></div><a href="https://digital.jal.co.jp/ssci/identification?lang=zh-Hant" target="_blank" class="block w-full bg-white/20 backdrop-blur-md border border-white/30 rounded-xl p-3 text-center mb-4 hover:bg-white/30 transition-all shadow-md"><div class="font-bold text-lg flex items-center justify-center gap-2"><i class="ph-bold ph-globe-hemisphere-east"></i> JAL 線上報到</div><div class="text-[10px] opacity-80 mt-1">出發前 24 小時開放 • 點擊進入</div></a></div><div class="grid grid-cols-2 gap-3 mb-6"><a href="https://world.jorudan.co.jp/mln/zh-tw/" target="_blank" class="ios-card p-3 flex flex-col items-center justify-center text-center active:scale-95 transition-transform"><i class="ph-duotone ph-train text-2xl text-green-500 mb-1"></i><span class="text-xs font-bold text-slate-700">乘換案內</span></a><a href="https://www.coinlocker-navi.com/" target="_blank" class="ios-card p-3 flex flex-col items-center justify-center text-center active:scale-95 transition-transform"><i class="ph-duotone ph-locker text-2xl text-blue-500 mb-1"></i><span class="text-xs font-bold text-slate-700">置物櫃</span></a></div><div class="ios-card p-4"><div class="flex items-center gap-2 mb-4"><div class="w-8 h-8 rounded-full bg-pink-100 flex items-center justify-center text-pink-500"><i class="ph-fill ph-translate"></i></div><h3 class="font-bold text-slate-800">手指日文</h3></div><div class="flex bg-slate-100 rounded-lg p-1 mb-4"><button @click="phraseTab = 'food'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'food' ? 'bg-white shadow text-slate-800' : 'text-slate-400'">餐廳</button><button @click="phraseTab = 'shop'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'shop' ? 'bg-white shadow text-slate-800' : 'text-slate-400'">購物</button><button @click="phraseTab = 'help'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'help' ? 'bg-white shadow text-red-500' : 'text-slate-400'">緊急</button></div><div class="grid grid-cols-2 gap-2"><template x-for="p in phrases[phraseTab]"><div @click="openPhrase(p, phraseTab)" class="bg-gray-50 border border-gray-100 rounded-xl p-3 active:bg-gray-100 active:scale-95 transition-transform text-center"><div class="text-sm font-bold text-slate-800 truncate" x-text="p.jp"></div><div class="text-[10px] text-slate-500 mt-1 flex justify-center items-center gap-1"><span x-text="p.cn"></span> <i class="ph-bold ph-speaker-high text-pink-400"></i></div></div></template></div></div></div>
                <div class="swiper-slide px-4 pb-24"><div class="ios-card bg-slate-800 text-white p-6 mb-6 shadow-xl relative overflow-hidden"><div class="absolute -right-6 -top-6 w-32 h-32 bg-white/5 rounded-full blur-2xl"></div><div class="text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">總花費 (日幣)</div><div class="text-4xl font-black mb-2 flex items-baseline gap-1">¥ <span x-text="totalSpent.toLocaleString()"></span></div><div class="text-sm text-slate-400 font-bold">≈ NT$ <span x-text="Math.round(totalSpent * 0.22).toLocaleString()"></span></div><button @click="showMoneyModal = true; newMoney = {title:'', amount:'', cat:'food'}" class="absolute bottom-4 right-4 bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform"><i class="ph-bold ph-plus text-xl"></i></button></div><div class="flex justify-between items-end mb-3 ml-1"><h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider">消費紀錄</h3><div class="flex gap-2"><button @click="exportMoney()" class="text-xs font-bold text-slate-500 bg-white border border-slate-200 px-3 py-1 rounded-full active:scale-95 transition-transform flex items-center gap-1"><i class="ph-bold ph-export"></i> 分享</button><button @click="resetMoney()" class="text-[10px] text-slate-400 underline">重置</button></div></div><div class="space-y-3" x-show="moneyList.length > 0"><template x-for="(item, idx) in moneyList"><div class="ios-card p-3 flex justify-between items-center"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full flex items-center justify-center text-lg" :class="getMoneyIcon(item.cat).bg"><i :class="getMoneyIcon(item.cat).icon"></i></div><div><div class="font-bold text-slate-800" x-text="item.title"></div><div class="text-[10px] text-slate-400" x-text="item.date"></div></div></div><div class="text-right"><div class="font-bold font-mono text-slate-800">¥<span x-text="Number(item.amount).toLocaleString()"></span></div><button @click="deleteMoney(idx)" class="text-[10px] text-red-400 mt-1">刪除</button></div></div></template></div><div x-show="moneyList.length === 0" class="text-center text-slate-400 text-xs mt-10">還沒有消費紀錄，按右上角 + 記一筆吧！</div></div>
                <template x-for="(day, index) in days" :key="index">
                    <div class="swiper-slide px-4 pb-24">
                        <div class="flex justify-center mb-6">
                            <template x-if="day.hotel !== 'Sweet Home'"><a :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(day.hotel)" target="_blank" class="bg-white px-4 py-2 rounded-full shadow-sm text-xs font-bold text-slate-600 border border-slate-100 flex items-center gap-2 hover:bg-slate-50 transition-colors"><i class="ph-fill ph-bed text-indigo-500"></i><span x-text="day.hotel"></span><i class="ph-bold ph-arrow-square-out text-slate-400 text-[10px]"></i></a></template>
                            <template x-if="day.hotel === 'Sweet Home'"><div class="bg-white px-4 py-2 rounded-full shadow-sm text-xs font-bold text-slate-600 border border-slate-100 flex items-center gap-2"><i class="ph-fill ph-house text-pink-500"></i><span x-text="day.hotel"></span></div></template>
                        </div>

    <script>
        function tripData() {
            // ... (Data & Config Same as v22) ...
            const defaultPrepData = { ticketsWallet: { 'Skyliner': '', 'Disney': '', 'Hotel': '', 'VJW': '' }, tickets: [ { name: 'N\'EX 成田特快', desc: '機場 ➔ 新宿', link: 'https://www.jreast.co.jp/multi/zh-CHT/nex/' }, { name: 'Skyliner', desc: '上野 ➔ 機場', link: 'https://www.keisei.co.jp/keisei/tetudou/skyliner/tc/' }, { name: '箱根周遊券 (2日)', desc: '新宿小田急旅遊中心', link: 'https://www.odakyu.jp/tc/passes/hakone/' }, { name: '浪漫特快 (特急券)', desc: '需劃位 (展望席)', link: 'https://www.web-odakyu.com/e-romancecar/' }, { name: '蕃 YORONIKU', desc: '2/1 搶訂 18:30', link: 'https://tabelog.com/tw/tokyo/A1303/A130302/13211927/' }, { name: 'SHIBUYA SKY', desc: '預約 15:00-16:00', link: 'https://www.shibuya-scramble-square.com/sky/ticket/zh_tw/' } ], luggage: { '證件': [{ name: '護照', checked: false }, { name: 'Visit Japan Web (入境通關 QR Code)', checked: false }, { name: '日幣/信用卡', checked: false }, { name: '西瓜卡', checked: false }], '電子': [{ name: '網卡/eSim', checked: false }, { name: '行動電源', checked: false }, { name: '充電組', checked: false }], '生活': [{ name: '衣物 (5天)', checked: false }, { name: '好走的鞋', checked: false }, { name: '牙刷/藥品', checked: false }] }, shopping: { '藥妝與保健': [ { name: '合力他命 EX Plus', desc: '緩解疲勞 (每人限購)', checked: false }, { name: 'EVE 止痛藥 (藍/白)', desc: '頭痛生理痛神藥', checked: false }, { name: 'Wakamoto 若元錠', desc: '腸胃保健', checked: false }, { name: 'DHC 護唇膏', desc: '便宜好用', checked: false }, { name: '眼藥水 (Lycee/參天)', desc: '涼感/小花', checked: false } ], '零食與伴手禮': [ { name: 'Tokyo Banana', desc: '經典東京香蕉蛋糕', checked: false }, { name: 'NY Perfect Cheese', desc: '起司脆餅 (機場/東京站)', checked: false }, { name: 'Royce 生巧克力', desc: '需冷藏 (機場買)', checked: false }, { name: '白色戀人', desc: '北海道名產 (機場有)', checked: false } ], '服飾與其他': [ { name: 'Uniqlo 發熱衣', desc: '比台灣便宜很多', checked: false }, { name: 'New Balance', desc: '日本限定配色', checked: false } ] } };
            let initialData = defaultPrepData;
            let initialMoney = [];
            
            // 安全讀取
            try { 
                const s = localStorage.getItem('tokyo_2026_fixed_v8'); 
                if(s && s !== "undefined") initialData = JSON.parse(s); 
                const m = localStorage.getItem('tokyo_2026_money_v1'); 
                if(m && m !== "undefined") initialMoney = JSON.parse(m); 
            } catch(e){ console.error("Data load error, using default"); }

            return {
                activeIndex: 0, showChatModal: false, showKeySettings: false, swiperInstance: null,
                apiKey: localStorage.getItem('gemini_api_key') || '', apiKeyTemp: '', chatInput: '', isAiThinking: false,
                // v25: 鎖定成功模型
                modelId: localStorage.getItem('gemini_model_id') || 'gemini-2.5-flash',
                modelIdTemp: '',
                availableModels: [],
                debugLogs: [],
                chatHistory: JSON.parse(localStorage.getItem('chat_history') || '[]'),
                prepData: initialData, moneyList: initialMoney,
                weatherData: { tokyo: { temp: '--', icon: 'ph-dots-three', desc: '載入中' }, hakone: { temp: '--', icon: 'ph-dots-three', desc: '載入中' } },
                statusMsg: 'v25 Debug', toastText: '', showToast: false,
                modalOpen: false, showAddModal: false, showMoneyModal: false, showTaxiModal: false,
                currentPhrase: { jp: '', cn: '', romaji: '', cat: '' }, currentTaxi: { jpName: '', address: '' },
                newItem: { cat: '藥妝與保健', name: '', desc: '' }, newMoney: { title: '', amount: '', cat: 'food' },
                
                phrases: { food: [ { jp: 'メニューをください', cn: '請給我菜單', romaji: 'Menyuu o kudasai' }, { jp: 'これをお願いします', cn: '我要點這個', romaji: 'Kore o onegaishimasu' }, { jp: 'お水をください', cn: '請給我水', romaji: 'Omizu o kudasai' }, { jp: 'お箸をください', cn: '請給我筷子', romaji: 'Ohashi o kudasai' }, { jp: 'とても美味しかったです', cn: '非常好吃', romaji: 'Totemo oishikatta desu' }, { jp: '氷なしでお願いします', cn: '去冰', romaji: 'Koori nashi de' }, { jp: 'お会計お願いします', cn: '買單', romaji: 'Okaikei onegaishimasu' } ], shop: [ { jp: 'いくらですか？', cn: '請問多少錢？', romaji: 'Ikura desuka?' }, { jp: 'クレジットカードは使えますか？', cn: '可用信用卡嗎？', romaji: 'Kurejitto kaado wa tsukaemasuka?' }, { jp: '新しい在庫はありますか？', cn: '有新庫存嗎？', romaji: 'Atarashii zaiko wa arimasuka?' }, { jp: '免税できますか？', cn: '可免稅嗎？', romaji: 'Menzei dekimasuka?' }, { jp: '袋を買います', cn: '買袋子', romaji: 'Fukuro o kaimasu' } ], help: [ { jp: '駅はどこですか？', cn: '車站在哪裡？', romaji: 'Eki wa doko desuka?' }, { jp: '写真を撮ってもらえますか？', cn: '可以幫我拍照嗎？', romaji: 'Shashin o totte moraemasuka?' }, { jp: 'すみません', cn: '不好意思 / 借過', romaji: 'Sumimasen' }, { jp: '道に迷いました', cn: '我迷路了', romaji: 'Michi ni mayoimashita' }, { jp: 'トイレはどこ？', cn: '廁所在哪？', romaji: 'Toire wa doko?' } ] },

                get totalSpent() { return this.moneyList.reduce((acc, item) => acc + Number(item.amount), 0); },

                initApp() { 
                    this.initWeather(); 
                    this.modelIdTemp = this.modelId; 
                    this.apiKeyTemp = this.apiKey;
                    this.startClock();
                    this.$nextTick(() => { this.swiperInstance = new Swiper(".mySwiper", { autoHeight: true, spaceBetween: 20, speed: 400, on: { slideChange: (s) => { this.activeIndex = s.activeIndex; window.scrollTo({ top: 0, behavior: 'smooth' }); } } }); setTimeout(() => this.autoNavigate(), 1000); }); 
                },

                // 強制重置功能
                hardReset() {
                    if(confirm('確定要清除所有資料（包含 Key、記帳、清單）並重置嗎？')) {
                        localStorage.clear();
                        alert('已清除！網頁將重新整理。');
                        location.reload();
                    }
                },

                openChat() { this.showChatModal = true; this.$nextTick(() => this.scrollToBottom()); },
                
                // Logging System
                log(msg, type = 'info') {
                    const time = new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
                    this.debugLogs.push({ msg: `[${time}] ${msg}`, type });
                    this.$nextTick(() => {
                        const box = document.getElementById('consoleBox');
                        if(box) box.scrollTop = box.scrollHeight;
                    });
                },

                // v25: 移植 v19 的成功邏輯 (Fetch) + Logging
                async checkModels() {
                    const k = this.apiKeyTemp.trim();
                    if(!k) return alert('請先填入 Key');
                    this.log('正在偵測模型 (GET listModels)...');
                    this.availableModels = [];
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
                        const data = await res.json();
                        if(!res.ok) throw new Error(`${res.status} ${data.error?.message}`);
                        this.availableModels = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent')).map(m => m.name.replace('models/', ''));
                        this.log(`偵測成功！找到 ${this.availableModels.length} 個模型。`, 'ok');
                    } catch (e) {
                        this.log(`偵測失敗: ${e.message}`, 'err');
                    }
                },

                saveSettings() {
                    if (this.apiKeyTemp.trim().length > 10) {
                        this.apiKey = this.apiKeyTemp.trim();
                        localStorage.setItem('gemini_api_key', this.apiKey);
                    }
                    if (this.modelIdTemp.trim().length > 0) {
                        this.modelId = this.modelIdTemp.trim();
                        localStorage.setItem('gemini_model_id', this.modelId);
                    }
                    this.showKeySettings = false;
                    this.toastText = '設定已儲存'; this.triggerToast();
                },
                
                // v25: 測試連線按鈕 (發送 Hi)
                async testSimpleChat() {
                    this.log('開始測試連線...');
                    this.performChat("Hi", false);
                },

                async sendChat() {
                    if (!this.chatInput.trim()) return;
                    const msg = this.chatInput;
                    this.chatInput = '';
                    this.pushMsg('user', msg);
                    this.performChat(msg, true);
                },

                // 核心發送邏輯
                async performChat(userMsg, withContext) {
                    if (!this.apiKey) { alert('請設定 API Key'); this.showKeySettings = true; return; }
                    this.isAiThinking = true;

                    // 確保不重複 models/
                    const cleanModelId = this.modelId.replace('models/', '');
                    this.log(`準備發送 POST 到: .../models/${cleanModelId}...`);
                    
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${cleanModelId}:generateContent?key=${this.apiKey}`;
                    
                    // Payload
                    let payload = {
                        contents: [{ role: "user", parts: [{ text: userMsg }] }],
                        // 加入安全設定 (v20 有加，所以這裡也加)
                        safetySettings: [
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ]
                    };

                    if (withContext) {
                        const context = JSON.stringify(this.days.map(d => ({ title: d.title, events: d.events.map(e => `${e.time} ${e.name}`) })));
                        payload.contents[0].parts[0].text = `你是一個專業的東京導遊。這是使用者的行程表：${context}。請根據行程回答使用者的問題。使用者問：${userMsg}`;
                        this.log('已夾帶行程 Context');
                    } else {
                        this.log('測試模式：不夾帶行程資料');
                    }

                    try {
                        this.log('正在等待回應...');
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 12000); 

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeoutId);
                        this.log(`收到回應。Status: ${response.status}`);

                        if (!response.ok) {
                            const errJson = await response.json();
                            throw new Error(`${response.status} - ${errJson.error?.message || JSON.stringify(errJson)}`);
                        }

                        const data = await response.json();
                        if (!data.candidates || data.candidates.length === 0) throw new Error('API 回傳空值');

                        const aiText = data.candidates[0].content.parts[0].text;
                        this.log('解析成功！', 'ok');
                        this.pushMsg('ai', aiText);

                    } catch (error) {
                        console.error(error);
                        let errStr = error.toString();
                        if (error.name === 'AbortError') errStr = '連線逾時 (Timeout)';
                        this.log(`錯誤: ${errStr}`, 'err');
                        this.pushMsg('ai', `❌ 錯誤: ${errStr}`, true);
                    } finally {
                        this.isAiThinking = false;
                    }
                },

                pushMsg(role, content, isError = false) { const id = Date.now(); this.chatHistory.push({ id, role, content, isError, time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) }); localStorage.setItem('chat_history', JSON.stringify(this.chatHistory)); this.$nextTick(() => this.scrollToBottom()); return id; },
                scrollToBottom() { const c = document.getElementById('chatContainer'); if(c) c.scrollTop = c.scrollHeight; },
                renderMarkdown(text) { return marked.parse(text); },
                triggerToast() { this.showToast = false; setTimeout(() => this.showToast = true, 50); setTimeout(() => this.showToast = false, 2000); },
                
                // ... (Functions: speak, copy, save, etc.) ...
                startClock() { setInterval(() => this.checkActiveEvent(), 60000); this.checkActiveEvent(); },
                enableSimulateMode() { if (confirm('開啟時光機模擬 3/14 17:00？')) { this.simulatedTime = new Date('2026-03-14T17:00:00'); this.checkActiveEvent(); this.autoNavigate(); alert('已切換至 3/14 17:00！'); } },
                getNow() { return this.simulatedTime || new Date(); },
                checkActiveEvent() {
                    const now = this.getNow();
                    const dateMap = { '14': 0, '15': 1, '16': 2, '17': 3, '18': 4 };
                    const day = now.getDate();
                    if (now.getMonth() + 1 !== 3 || !dateMap.hasOwnProperty(day)) { this.activeEventId = null; return; }
                    const dayIndex = dateMap[day];
                    const todayEvents = this.days[dayIndex].hasOptions ? this.days[dayIndex].options[this.days[dayIndex].selectedOption] : this.days[dayIndex].events;
                    let foundEvent = null;
                    const nowMins = now.getHours() * 60 + now.getMinutes();
                    todayEvents.forEach((ev, idx) => {
                        const [h, m] = ev.time.split(':').map(Number);
                        if (nowMins >= h * 60 + m) foundEvent = `event-${dayIndex}-${idx}`;
                    });
                    this.activeEventId = foundEvent;
                },
                isCurrentEvent(dayIndex, event) { return false; },
                autoNavigate() {
                    if (this.activeEventId) {
                        const [_, dayIdx] = this.activeEventId.split('-');
                        this.swiperInstance.slideTo(parseInt(dayIdx) + 3);
                        setTimeout(() => { const el = document.getElementById(this.activeEventId); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 500);
