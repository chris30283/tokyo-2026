<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="東京之旅">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">
    
    <title>2026 東京賞櫻 (v28 防彈版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F2F2F7; padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); padding-top: calc(env(safe-area-inset-top) + 25px); padding-bottom: 15px; }
        main { padding-top: calc(env(safe-area-inset-top) + 200px); }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #FF8BA7; color: white; transform: scale(1.05); }
        .tab-inactive { background-color: white; color: #8E8E93; }
        .swiper { width: 100%; height: auto; }
        
        /* Chat Styles */
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .chat-user { background: #3B82F6; color: white; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
        .chat-ai { background: #F3F4F6; color: #1F2937; border-bottom-left-radius: 4px; align-self: flex-start; margin-right: auto; }
        
        /* Error Box (防彈機制) */
        #global-error { display: none; position: fixed; top: 0; left: 0; right: 0; background: #fee2e2; color: #991b1b; padding: 20px; z-index: 99999; border-bottom: 2px solid red; font-size: 12px; font-family: monospace; word-break: break-all; }

        /* v28 Console */
        .console-box { background: #1e1e1e; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 8px; height: 150px; overflow-y: auto; margin-top: 10px; border: 2px solid #333; line-height: 1.4; white-space: pre-wrap; display: block; }
        .console-err { color: #ff5555; font-weight: bold; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="text-slate-700" x-data="tripData()" x-init="initApp()">

    <div id="global-error"></div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var e = document.getElementById('global-error');
            e.style.display = 'block';
            e.innerHTML = `<strong>⚠️ 程式發生錯誤 (App Crash)</strong><br>${msg}<br>Line: ${line}`;
            return false;
        };
    </script>

    <button @click="openChat()" class="fixed bottom-6 right-6 z-[5000] w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full shadow-xl flex items-center justify-center text-white active:scale-90 transition-transform border-4 border-white/20">
        <i class="ph-fill ph-robot text-2xl"></i>
    </button>

    <div x-show="showChatModal" x-cloak class="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm" @click.self="showChatModal = false">
        <div class="bg-white w-full h-[90vh] max-w-md rounded-3xl shadow-2xl relative flex flex-col overflow-hidden">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600"><i class="ph-fill ph-bug"></i></div>
                    <div><h3 class="font-bold text-slate-800 text-sm">Sakura Bot</h3><p class="text-[10px] text-green-500">v28 防彈版</p></div>
                </div>
                <div class="flex gap-2">
                    <button @click="showKeySettings = !showKeySettings" class="p-2 text-slate-400"><i class="ph-bold ph-gear"></i></button>
                    <button @click="showChatModal = false" class="p-2 text-slate-400"><i class="ph-bold ph-x"></i></button>
                </div>
            </div>

            <div x-show="showKeySettings || !apiKey" class="bg-slate-100 p-4 border-b border-slate-200 overflow-y-auto" style="max-height: 50vh;">
                <label class="text-xs font-bold text-slate-500 mb-1">API Key</label>
                <input type="password" x-model="apiKeyTemp" placeholder="AIza..." class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-3 bg-white outline-none">
                <label class="text-xs font-bold text-slate-500 mb-1">模型 ID</label>
                <input type="text" x-model="modelIdTemp" class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-3 bg-white font-mono outline-none">
                <button @click="checkModels()" class="w-full bg-blue-500 text-white text-xs font-bold py-2 rounded-lg mb-3 shadow">1. 偵測可用模型</button>
                <div x-show="availableModels.length > 0" class="mb-3 flex flex-wrap gap-1"><template x-for="m in availableModels"><button @click="modelIdTemp = m; saveSettings()" class="text-[10px] bg-white border border-green-200 text-green-700 px-2 py-1 rounded truncate"><span x-text="m"></span></button></template></div>
                <button @click="saveSettings()" class="bg-indigo-500 text-white text-xs font-bold px-3 py-3 rounded-lg w-full shadow-md">儲存設定</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 bg-white flex flex-col" id="chatContainer">
                <div class="flex-1 space-y-4 min-h-[100px]">
                    <div x-show="chatHistory.length === 0" class="text-center text-slate-400 text-xs mt-4">嗨！請按下方測試連線。</div>
                    <template x-for="msg in chatHistory"><div class="flex flex-col w-full"><div class="chat-bubble shadow-sm markdown-body" :class="msg.role === 'user' ? 'chat-user' : 'chat-ai'" x-html="renderMarkdown(msg.content)"></div></div></template>
                    <div x-show="isAiThinking" class="chat-bubble chat-ai w-16 flex items-center justify-center"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
                </div>
                <div class="mt-4 border-t pt-2">
                    <div class="flex justify-between items-center mb-1"><span class="text-[10px] font-bold text-slate-400">Logs</span><button @click="debugLogs=[]" class="text-[10px] text-slate-400 underline">清除</button></div>
                    <div class="console-box" id="consoleBox"><template x-for="log in debugLogs"><div :class="log.type === 'err' ? 'console-err' : 'console-log'">> <span x-text="log.msg"></span></div></template></div>
                </div>
            </div>

            <div class="p-3 bg-slate-50 border-t border-slate-100 flex flex-col gap-2">
                <button @click="testSimpleChat()" class="w-full bg-green-500 text-white text-xs font-bold py-2 rounded-lg shadow">2. 測試連線 (Hi)</button>
                <div class="flex gap-2">
                    <input type="text" x-model="chatInput" @keydown.enter="sendChat()" placeholder="輸入訊息..." class="flex-1 bg-white border rounded-full px-4 py-2 text-sm outline-none">
                    <button @click="sendChat()" :disabled="!chatInput || isAiThinking" class="w-10 h-10 bg-indigo-500 rounded-full text-white flex items-center justify-center"><i class="ph-bold ph-paper-plane-right"></i></button>
                </div>
            </div>

    <header class="fixed top-0 inset-x-0 z-50 glass-nav">
        <div class="px-4 py-3"><div class="flex justify-between items-center mb-3"><h1 class="text-xl font-bold text-slate-800">2026 東京賞櫻 🌸</h1></div><div class="flex space-x-3 overflow-x-auto no-scrollbar pb-1"><button @click="slideTo(0)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 0 ? 'tab-active' : 'tab-inactive'">行程</button></div></div>
    </header>

    <main>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <template x-for="(day, index) in days" :key="index">
                    <div class="swiper-slide px-4 pb-24">
                        <div class="ios-card p-4 text-center text-slate-400 font-bold mb-4" x-text="day.title"></div>
                        <div class="relative pl-4">
                            <div class="timeline-line"></div>
                            <div class="space-y-6">
                                <template x-for="event in (day.hasOptions ? day.options[day.selectedOption] : day.events)">
                                    <div class="relative pl-10">
                                        <div class="absolute left-0 top-0 flex flex-col items-center z-10"><div class="w-12 h-12 rounded-full border-4 border-[#F2F2F7] flex items-center justify-center bg-blue-500 text-white"><i class="ph-bold ph-check"></i></div></div>
                                        <div class="ios-card p-4">
                                            <div class="font-bold text-slate-800" x-text="event.name"></div>
                                            <div class="text-xs text-slate-500" x-text="event.desc"></div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        function tripData() {
            // Load Safe Data
            let daysData = [];
            try {
                daysData = JSON.parse(document.getElementById('safe-data-days').textContent);
            } catch(e) {
                alert('資料讀取失敗！' + e.message);
            }

            return {
                activeIndex: 0, showChatModal: false, showKeySettings: false, swiperInstance: null,
                apiKey: localStorage.getItem('gemini_api_key') || '', apiKeyTemp: '', chatInput: '', isAiThinking: false,
                modelId: localStorage.getItem('gemini_model_id') || 'gemini-2.5-flash', modelIdTemp: '',
                availableModels: [], debugLogs: [],
                chatHistory: JSON.parse(localStorage.getItem('chat_history') || '[]'),
                days: daysData,
                toastText: '', showToast: false,

                initApp() { 
                    this.modelIdTemp = this.modelId; 
                    this.apiKeyTemp = this.apiKey;
                    this.$nextTick(() => { this.swiperInstance = new Swiper(".mySwiper", { autoHeight: true, spaceBetween: 20 }); }); 
                },

                openChat() { this.showChatModal = true; this.$nextTick(() => this.scrollToBottom()); },
                log(msg, type = 'info') {
                    const time = new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
                    this.debugLogs.push({ msg: `[${time}] ${msg}`, type });
                    this.$nextTick(() => { const box = document.getElementById('consoleBox'); if(box) box.scrollTop = box.scrollHeight; });
                },

                async checkModels() {
                    const k = this.apiKeyTemp.trim();
                    if(!k) return alert('Key?');
                    this.log('偵測模型...');
                    this.availableModels = [];
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
                        const data = await res.json();
                        if(!res.ok) throw new Error(data.error?.message);
                        this.availableModels = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent')).map(m => m.name.replace('models/', ''));
                        this.log(`成功: 找到 ${this.availableModels.length} 個`, 'ok');
                    } catch (e) { this.log(`失敗: ${e.message}`, 'err'); }
                },

                saveSettings() {
                    localStorage.setItem('gemini_api_key', this.apiKey = this.apiKeyTemp.trim());
                    localStorage.setItem('gemini_model_id', this.modelId = this.modelIdTemp.trim());
                    this.showKeySettings = false;
                    this.log('設定已儲存');
                },

                async testSimpleChat() { this.performChat("Hi", false); },
                async sendChat() { 
                    if(!this.chatInput.trim()) return;
                    const msg = this.chatInput; this.chatInput = '';
                    this.pushMsg('user', msg);
                    this.performChat(msg, true);
                },

                async performChat(userMsg, withContext) {
                    if (!this.apiKey) { alert('No Key'); this.showKeySettings = true; return; }
                    this.isAiThinking = true;
                    
                    const cleanModelId = this.modelId.replace('models/', '');
                    this.log(`發送給 ${cleanModelId}...`);
                    
                    const payload = {
                        contents: [{ role: "user", parts: [{ text: userMsg }] }]
                    };

                    if (withContext) {
                        // 簡化 Context 防止 payload 過大
                        const simpleContext = this.days.map(d => `${d.shortTitle}: ` + (d.hasOptions ? d.options[d.selectedOption] : d.events).map(e => e.name).join(', ')).join('\n');
                        payload.contents[0].parts[0].text = `行程表：\n${simpleContext}\n\n回答：${userMsg}`;
                    }

                    try {
                        const controller = new AbortController();
                        setTimeout(() => controller.abort(), 12000);
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${cleanModelId}:generateContent?key=${this.apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                            signal: controller.signal
                        });
                        
                        if (!res.ok) throw new Error((await res.json()).error?.message);
                        const data = await res.json();
                        this.pushMsg('ai', data.candidates[0].content.parts[0].text);
                        this.log('成功回應', 'ok');
                    } catch (e) {
                        this.log(`錯誤: ${e.message}`, 'err');
                        this.pushMsg('ai', `Error: ${e.message}`);
                    } finally {
                        this.isAiThinking = false;
                    }
                },

                pushMsg(role, content) { 
                    this.chatHistory.push({ role, content, time: new Date().toLocaleTimeString() }); 
                    localStorage.setItem('chat_history', JSON.stringify(this.chatHistory));
                    this.$nextTick(() => this.scrollToBottom());
                },
                scrollToBottom() { const c = document.getElementById('chatContainer'); if(c) c.scrollTop = c.scrollHeight; },
                renderMarkdown(text) { return marked.parse(text); },
                toggleCheck(item) { item.checked = !item.checked; },
                resetData() { /* ... */ },
                openAddModal() { /* ... */ },
                copyToClipboard(t) { /* ... */ }
            }
        }
    </script>
</body>
</html>
