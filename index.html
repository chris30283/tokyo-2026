<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="東京之旅">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">
    
    <title>2026 東京賞櫻 (v13 終極除錯版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F2F2F7; padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); padding-top: calc(env(safe-area-inset-top) + 25px); padding-bottom: 15px; }
        main { padding-top: calc(env(safe-area-inset-top) + 200px); }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #FF8BA7; color: white; transform: scale(1.05); }
        .tab-inactive { background-color: white; color: #8E8E93; }
        .swiper { width: 100%; height: auto; }
        
        /* Chat Styles */
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .chat-user { background: #3B82F6; color: white; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
        .chat-ai { background: #F3F4F6; color: #1F2937; border-bottom-left-radius: 4px; align-self: flex-start; margin-right: auto; }
        .chat-status { background: #FFF7ED; color: #C2410C; border: 1px dashed #FDBA74; font-family: monospace; font-size: 12px; }
        .chat-error { background: #FEE2E2; color: #DC2626; border: 1px solid #FECACA; }
        
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="text-slate-700" x-data="tripData()" x-init="initApp()">

    <button @click="openChat()" class="fixed bottom-6 right-6 z-[900] w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full shadow-xl flex items-center justify-center text-white active:scale-90 transition-transform border-4 border-white/20">
        <i class="ph-fill ph-robot text-2xl"></i>
        <div x-show="!apiKey" class="absolute top-0 right-0 w-4 h-4 bg-red-500 rounded-full border-2 border-white animate-bounce"></div>
    </button>

    <div x-show="showChatModal" x-cloak class="fixed inset-0 z-[999] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm" @click.self="showChatModal = false">
        <div class="bg-white w-full h-[80vh] max-w-md rounded-3xl shadow-2xl relative flex flex-col overflow-hidden">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600"><i class="ph-fill ph-robot"></i></div>
                    <div><h3 class="font-bold text-slate-800 text-sm">Sakura Bot (Debug)</h3><p class="text-[10px] text-green-500">v13 • Network Check</p></div>
                </div>
                <div class="flex gap-2">
                    <button @click="showKeySettings = !showKeySettings" class="p-2 text-slate-400"><i class="ph-bold ph-gear"></i></button>
                    <button @click="showChatModal = false" class="p-2 text-slate-400"><i class="ph-bold ph-x"></i></button>
                </div>
            </div>

            <div x-show="showKeySettings || !apiKey" class="bg-slate-100 p-4 border-b border-slate-200">
                <label class="text-xs font-bold text-slate-500 mb-1">Google Gemini API Key</label>
                <input type="text" x-model="apiKeyTemp" placeholder="AIza..." class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-2">
                <button @click="saveApiKey()" class="bg-indigo-500 text-white text-xs font-bold px-3 py-2 rounded-lg w-full">儲存 Key</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-white" id="chatContainer">
                <template x-for="msg in chatHistory">
                    <div class="flex flex-col w-full">
                        <div class="chat-bubble shadow-sm markdown-body" 
                             :class="[msg.role === 'user' ? 'chat-user' : 'chat-ai', msg.isError ? 'chat-error' : '', msg.isStatus ? 'chat-status' : '']" 
                             x-html="renderMarkdown(msg.content)"></div>
                        <div class="text-[10px] text-slate-300 mt-1 px-1" :class="msg.role === 'user' ? 'text-right' : 'text-left'" x-text="msg.time"></div>
                    </div>
                </template>
            </div>

            <div class="p-3 bg-slate-50 border-t border-slate-100 flex gap-2">
                <input type="text" x-model="chatInput" @keydown.enter="sendChat()" placeholder="試著說：你好" class="flex-1 bg-white border rounded-full px-4 py-2 text-sm outline-none">
                <button @click="sendChat()" :disabled="isAiThinking" class="w-10 h-10 bg-indigo-500 rounded-full text-white flex items-center justify-center disabled:opacity-50"><i class="ph-bold ph-paper-plane-right"></i></button>
            </div>
        </div>
    </div>

    <header class="fixed top-0 inset-x-0 z-50 glass-nav">
        <div class="px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div @click="enableSimulateMode()"><h1 class="text-xl font-bold text-slate-800">2026 東京賞櫻 🌸</h1><p class="text-[10px] text-slate-400 font-bold uppercase">MAR 14 - 18 • 5 DAYS</p></div>
                <div class="bg-white/80 border border-slate-100 rounded-2xl pl-3 pr-4 py-1.5 flex items-center gap-3">
                    <div class="text-center"><i :class="getCurrentWeather().icon + ' text-2xl text-sky-500'"></i></div>
                    <div class="text-left"><div class="text-[10px] text-slate-400 font-bold"><i class="ph-bold ph-map-pin text-sky-400"></i><span x-text="getCurrentWeather().loc"></span></div><div class="text-lg font-bold text-slate-800" x-text="getCurrentWeather().temp"></div></div>
                </div>
            </div>
            <div class="flex space-x-3 overflow-x-auto no-scrollbar pb-1" id="tabContainer">
                <button @click="slideTo(0)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 0 ? 'tab-active' : 'tab-inactive'">行前</button>
                <button @click="slideTo(1)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 1 ? 'tab-active' : 'tab-inactive'">資訊</button>
                <button @click="slideTo(2)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 2 ? 'tab-active bg-emerald-500' : 'tab-inactive'">記帳</button>
                <template x-for="(day, index) in days" :key="index"><button @click="slideTo(index + 3)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === (index + 3) ? 'tab-active' : 'tab-inactive'"><span x-text="day.shortTitle"></span></button></template>
            </div>
        </div>
    </header>

    <main>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400">行前準備清單 (v13 Debug)</div></div>
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400">資訊頁 (v13 Debug)</div></div>
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400">記帳頁 (v13 Debug)</div></div>
                <template x-for="day in days"><div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400" x-text="day.title"></div></div></template>
            </div>
        </div>
    </main>

    <script>
        function tripData() {
            // 基本資料 (簡化)
            const defaultPrepData = { ticketsWallet: {}, tickets: [], luggage: {}, shopping: {} };
            let initialData = defaultPrepData;
            try { const s = localStorage.getItem('tokyo_2026_fixed_v8'); if(s) initialData = JSON.parse(s); } catch(e){}

            return {
                activeIndex: 0, showChatModal: false, showKeySettings: false, swiperInstance: null,
                apiKey: localStorage.getItem('gemini_api_key') || '', apiKeyTemp: '', chatInput: '', isAiThinking: false,
                chatHistory: JSON.parse(localStorage.getItem('chat_history') || '[]'),
                prepData: initialData,
                weatherData: { tokyo: { temp: '20°C', icon: 'ph-sun', loc: '東京' } }, // Fake data for debug

                // AI Chat Logic v13 (Diagnostic)
                openChat() { this.showChatModal = true; this.$nextTick(() => this.scrollToBottom()); },
                saveApiKey() {
                    if (this.apiKeyTemp.trim().length > 10) {
                        this.apiKey = this.apiKeyTemp.trim();
                        localStorage.setItem('gemini_api_key', this.apiKey);
                        this.showKeySettings = false;
                        alert('Key 已儲存！請試著發送訊息。');
                    } else { alert('Key 格式似乎不對'); }
                },
                scrollToBottom() { const c = document.getElementById('chatContainer'); if(c) c.scrollTop = c.scrollHeight; },
                
                async sendChat() {
                    if (!this.chatInput.trim()) return;
                    if (!this.apiKey) { alert('請輸入 Key'); this.showKeySettings = true; return; }

                    const userMsg = this.chatInput;
                    this.chatInput = '';
                    this.pushMsg('user', userMsg);
                    this.isAiThinking = true;

                    // Step 1: 狀態回報
                    const statusId = this.pushMsg('ai', '🔄 [1/3] 正在準備資料...', false, true);

                    try {
                        // Context
                        const context = "使用者正在去東京旅遊，請簡短回答。";
                        
                        // Step 2: 發送請求
                        this.updateMsg(statusId, '📡 [2/3] 正在連線 Google Gemini...');
                        
                        // 設定 10秒 Timeout
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 10000);

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [ { role: "user", parts: [{ text: `System: ${context}\nUser: ${userMsg}` }] } ]
                            }),
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeoutId);

                        // Step 3: 檢查回應
                        this.updateMsg(statusId, '📥 [3/3] 收到回應，正在解析...');

                        if (!response.ok) {
                            const errJson = await response.json();
                            throw new Error(`API Error ${response.status}: ${JSON.stringify(errJson)}`);
                        }

                        const data = await response.json();
                        if (!data.candidates || data.candidates.length === 0) throw new Error('API 回傳空值 (Safety Blocked?)');

                        const aiText = data.candidates[0].content.parts[0].text;
                        
                        // 成功！移除狀態訊息，顯示結果
                        this.removeMsg(statusId);
                        this.pushMsg('ai', aiText);

                    } catch (error) {
                        console.error(error);
                        let errStr = error.toString();
                        if (error.name === 'AbortError') errStr = '連線逾時 (Timeout)，請檢查網路。';
                        if (errStr.includes('Failed to fetch')) errStr = '網路連線失敗 (CORS/Firewall)，請切換 4G/5G 試試。';
                        
                        this.removeMsg(statusId);
                        this.pushMsg('ai', `❌ 發生錯誤：\n${errStr}`, true);
                    } finally {
                        this.isAiThinking = false;
                    }
                },

                // 訊息處理 Helper
                pushMsg(role, content, isError = false, isStatus = false) {
                    const id = Date.now();
                    this.chatHistory.push({ id, role, content, isError, isStatus, time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) });
                    if (!isStatus) localStorage.setItem('chat_history', JSON.stringify(this.chatHistory));
                    this.$nextTick(() => this.scrollToBottom());
                    return id;
                },
                updateMsg(id, newContent) {
                    const msg = this.chatHistory.find(m => m.id === id);
                    if (msg) msg.content = newContent;
                },
                removeMsg(id) {
                    this.chatHistory = this.chatHistory.filter(m => m.id !== id);
                },
                renderMarkdown(text) { return marked.parse(text); },

                // Init (Minimal)
                initApp() {
                    this.$nextTick(() => {
                        this.swiperInstance = new Swiper(".mySwiper", { autoHeight: true, spaceBetween: 20 });
                    });
                },
                slideTo(i) { this.swiperInstance.slideTo(i); },
                getCurrentWeather() { return { loc: '東京', temp: '20°C', icon: 'ph-sun' }; },
                
                // Days Data
                days: [ { shortTitle: 'D1 3/14', title: 'Day 1: 新宿' }, { shortTitle: 'D2 3/15', title: 'Day 2: 箱根' }, { shortTitle: 'D3 3/16', title: 'Day 3: 海盜船' }, { shortTitle: 'D4 3/17', title: 'Day 4: 澀谷' }, { shortTitle: 'D5 3/18', title: 'Day 5: 上野' } ]
            }
        }
    </script>
</body>
</html>
