<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="東京之旅">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">
    
    <title>2026 東京賞櫻 (v17 自訂模型版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>

    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F2F2F7; padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); padding-top: calc(env(safe-area-inset-top) + 25px); padding-bottom: 15px; }
        main { padding-top: calc(env(safe-area-inset-top) + 200px); }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #FF8BA7; color: white; transform: scale(1.05); }
        .tab-inactive { background-color: white; color: #8E8E93; }
        .swiper { width: 100%; height: auto; }
        
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .chat-user { background: #3B82F6; color: white; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
        .chat-ai { background: #F3F4F6; color: #1F2937; border-bottom-left-radius: 4px; align-self: flex-start; margin-right: auto; }
        .chat-error { background: #FEE2E2; color: #DC2626; border: 1px solid #FECACA; }
        .typing-dot { display: inline-block; width: 6px; height: 6px; background-color: #9CA3AF; border-radius: 50%; animation: typing 1.4s infinite; margin: 0 2px; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; } .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes pulse-pink { 0%, 100% { border-color: #F472B6; box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7); } 50% { border-color: #EC4899; box-shadow: 0 0 0 4px rgba(244, 114, 182, 0); } }
        .active-event-card { border-left: 4px solid #F472B6; animation: pulse-pink 2s infinite; background: #FFF5F7; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="text-slate-700" x-data="tripData()" x-init="initApp()">

    <div x-show="showToast" class="fixed top-safe-top right-4 z-[1000] bg-black/70 text-white px-4 py-2 rounded-full text-xs font-bold backdrop-blur-md flex items-center gap-2 toast-msg" style="top: calc(env(safe-area-inset-top) + 20px);" x-cloak>
        <i class="ph-bold ph-check-circle text-green-400"></i> <span x-text="toastText"></span>
    </div>

    <button @click="openChat()" class="fixed bottom-6 right-6 z-[900] w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full shadow-xl flex items-center justify-center text-white active:scale-90 transition-transform border-4 border-white/20">
        <i class="ph-fill ph-robot text-2xl"></i>
        <div x-show="!apiKey" class="absolute top-0 right-0 w-4 h-4 bg-red-500 rounded-full border-2 border-white animate-bounce"></div>
    </button>

    <div x-show="showChatModal" x-cloak class="fixed inset-0 z-[999] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm" @click.self="showChatModal = false">
        <div class="bg-white w-full h-[80vh] max-w-md rounded-3xl shadow-2xl relative flex flex-col overflow-hidden">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600"><i class="ph-fill ph-robot"></i></div>
                    <div><h3 class="font-bold text-slate-800 text-sm">Sakura Bot</h3><p class="text-[10px] text-green-500" x-text="modelId"></p></div>
                </div>
                <div class="flex gap-2">
                    <button @click="showKeySettings = !showKeySettings" class="p-2 text-slate-400"><i class="ph-bold ph-gear"></i></button>
                    <button @click="showChatModal = false" class="p-2 text-slate-400"><i class="ph-bold ph-x"></i></button>
                </div>
            </div>

            <div x-show="showKeySettings || !apiKey" class="bg-slate-100 p-4 border-b border-slate-200">
                <label class="text-xs font-bold text-slate-500 mb-1">Google Gemini API Key</label>
                <input type="text" x-model="apiKeyTemp" placeholder="AIza..." class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-3 bg-white">
                
                <label class="text-xs font-bold text-slate-500 mb-1">模型 ID (Model ID)</label>
                <div class="text-[10px] text-slate-400 mb-1">請填入你在 AI Studio 看到的名稱 (例如 gemini-3.1-pro-review)</div>
                <input type="text" x-model="modelIdTemp" placeholder="gemini-1.5-flash" class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-3 bg-white font-mono">

                <button @click="saveSettings()" class="bg-indigo-500 text-white text-xs font-bold px-3 py-2 rounded-lg w-full">儲存設定</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-white" id="chatContainer">
                <div x-show="chatHistory.length === 0" class="text-center text-slate-400 text-xs mt-10">嗨！我是導遊。<br>目前使用模型：<span x-text="modelId" class="font-mono text-indigo-500"></span></div>
                <template x-for="msg in chatHistory">
                    <div class="flex flex-col w-full">
                        <div class="chat-bubble shadow-sm markdown-body" 
                             :class="[msg.role === 'user' ? 'chat-user' : 'chat-ai', msg.isError ? 'chat-error' : '']" 
                             x-html="renderMarkdown(msg.content)"></div>
                        <div class="text-[10px] text-slate-300 mt-1 px-1" :class="msg.role === 'user' ? 'text-right' : 'text-left'" x-text="msg.time"></div>
                    </div>
                </template>
                <div x-show="isAiThinking" class="chat-bubble chat-ai w-16 flex items-center justify-center"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
            </div>

            <div class="p-3 bg-slate-50 border-t border-slate-100 flex gap-2">
                <input type="text" x-model="chatInput" @keydown.enter="sendChat()" placeholder="輸入訊息..." class="flex-1 bg-white border rounded-full px-4 py-2 text-sm outline-none">
                <button @click="sendChat()" :disabled="isAiThinking" class="w-10 h-10 bg-indigo-500 rounded-full text-white flex items-center justify-center disabled:opacity-50"><i class="ph-bold ph-paper-plane-right"></i></button>
            </div>
        </div>
    </div>

    <header class="fixed top-0 inset-x-0 z-50 glass-nav">
        <div class="px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div @click="enableSimulateMode()"><h1 class="text-xl font-bold text-slate-800">2026 東京賞櫻 🌸</h1></div>
                <div class="bg-white/80 border border-slate-100 rounded-2xl pl-3 pr-4 py-1.5 flex items-center gap-3">
                    <div class="text-center"><i :class="getCurrentWeather().icon + ' text-2xl text-sky-500'"></i></div>
                    <div class="text-left"><div class="text-[10px] text-slate-400 font-bold"><i class="ph-bold ph-map-pin text-sky-400"></i><span x-text="getCurrentWeather().loc"></span></div><div class="text-lg font-bold text-slate-800" x-text="getCurrentWeather().temp"></div></div>
                </div>
            </div>
            <div class="flex space-x-3 overflow-x-auto no-scrollbar pb-1" id="tabContainer">
                <button @click="slideTo(0)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 0 ? 'tab-active' : 'tab-inactive'">行前</button>
                <button @click="slideTo(1)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 1 ? 'tab-active' : 'tab-inactive'">資訊</button>
                <button @click="slideTo(2)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 2 ? 'tab-active bg-emerald-500' : 'tab-inactive'">記帳</button>
                <template x-for="(day, index) in days" :key="index"><button @click="slideTo(index + 3)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === (index + 3) ? 'tab-active' : 'tab-inactive'"><span x-text="day.shortTitle"></span></button></template>
            </div>
        </div>
    </header>

    <main>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide px-4 pb-24">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3 ml-1">必備預約</h3>
                    <div class="grid gap-3 mb-8"><template x-for="ticket in prepData.tickets"><div class="ios-card p-4 flex justify-between items-center"><div><div class="font-bold text-slate-800" x-text="ticket.name"></div><div class="text-xs text-slate-400 mt-0.5" x-text="ticket.desc"></div></div><a :href="ticket.link" target="_blank" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full text-xs font-bold active:bg-slate-200">預約</a></div></template></div>
                    <div class="flex justify-between items-center mb-3 ml-1"><h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider">出發前檢查</h3><button @click="resetData()" class="text-[10px] text-slate-400 underline">重置清單</button></div>
                    <div class="ios-card overflow-hidden mb-8"><template x-for="(items, category) in prepData.luggage"><div class="border-b border-gray-100 last:border-0"><div class="bg-gray-50 px-4 py-2 text-[10px] font-bold text-slate-400 uppercase" x-text="category"></div><template x-for="item in items"><div @click="toggleCheck(item)" class="flex items-center gap-3 px-4 py-3 active:bg-gray-50 cursor-pointer"><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center check-circle" :class="item.checked ? 'checked-bg border-transparent' : 'border-gray-300'"><i x-show="item.checked" class="ph-bold ph-check text-white text-sm"></i></div><span class="text-sm font-medium text-slate-700" :class="{'line-through opacity-40': item.checked}" x-text="item.name"></span></div></template></div></template></div>
                    <div class="flex justify-between items-end mb-3 ml-1"><h3 class="text-sm font-bold text-orange-400 uppercase tracking-wider">🇯🇵 必買戰利品清單</h3><div class="flex gap-2"><button @click="exportShopping()" class="text-xs font-bold text-slate-500 bg-white border border-slate-200 px-3 py-1 rounded-full active:scale-95 transition-transform flex items-center gap-1"><i class="ph-bold ph-export"></i> 分享</button><button @click="openAddModal()" class="text-xs font-bold text-white bg-orange-400 px-3 py-1 rounded-full shadow active:scale-95 transition-transform flex items-center gap-1"><i class="ph-bold ph-plus"></i> 新增</button></div></div>
                    <div class="ios-card overflow-hidden mb-8"><template x-for="(items, category) in prepData.shopping"><div class="border-b border-gray-100 last:border-0" x-show="items.length > 0"><div class="bg-gray-50 px-4 py-2 text-[10px] font-bold text-slate-400 uppercase" x-text="category"></div><template x-for="(item, idx) in items"><div @click="toggleCheck(item)" class="flex items-center justify-between px-4 py-3 active:bg-gray-50 cursor-pointer group"><div class="flex items-center gap-3 flex-1"><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center check-circle transition-colors flex-shrink-0" :class="item.checked ? 'bg-orange-400 border-orange-400' : 'border-gray-300'"><i x-show="item.checked" class="ph-bold ph-check text-white text-sm"></i></div><div><div class="text-sm font-bold text-slate-700" :class="{'line-through opacity-40': item.checked}" x-text="item.name"></div><div class="text-[10px] text-slate-400" x-text="item.desc"></div></div></div><button @click.stop="deleteItem(category, idx)" class="p-2 text-slate-300 hover:text-red-500 transition-colors"><i class="ph-bold ph-trash"></i></button></div></template></div></template></div>
                </div>
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400">資訊頁 (請保持原內容)</div></div>
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400">記帳頁 (請保持原內容)</div></div>
                <template x-for="day in days"><div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400" x-text="day.title"></div></div></template>
            </div>
        </div>
    </main>

    <div x-show="modalOpen" class="bg-white w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl relative" @click.stop><button @click="modalOpen = false" class="absolute top-4 right-4 bg-gray-100 p-2 rounded-full"><i class="ph-bold ph-x text-lg"></i></button><span class="inline-block bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-xs font-bold mb-4" x-text="currentPhrase.cat"></span><h2 class="text-3xl font-bold text-slate-800 mb-2 leading-tight" x-text="currentPhrase.jp"></h2><p class="text-slate-400 text-sm font-mono mb-6" x-text="currentPhrase.romaji"></p><div class="border-t pt-4 mb-4"><p class="text-xl font-bold text-slate-600" x-text="currentPhrase.cn"></p></div><button @click="speak(currentPhrase.jp)" class="w-full bg-slate-100 text-slate-600 font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:bg-slate-200 transition-colors"><i class="ph-fill ph-speaker-high text-xl"></i> 唸給對方聽</button></div>
    <div x-show="showTaxiModal" class="bg-white w-full h-full max-w-md rounded-none md:rounded-3xl md:h-auto p-8 text-center shadow-2xl relative flex flex-col justify-center" @click.stop><button @click="showTaxiModal = false" class="absolute top-6 right-6 bg-gray-100 p-3 rounded-full"><i class="ph-bold ph-x text-xl"></i></button><div class="mb-6"><div class="inline-block bg-yellow-400 text-black px-4 py-1 rounded-full text-sm font-bold mb-2">TAXI CARD</div><p class="text-slate-400 text-xs">請將此畫面出示給司機看</p></div><div class="space-y-6"><div class="text-left bg-slate-50 p-4 rounded-xl border border-slate-100"><p class="text-xs text-slate-400 mb-1">給司機的話：</p><p class="text-lg font-bold text-slate-800">運転手さん、ここまでお願いします。</p></div><div><p class="text-xs text-slate-400 mb-2">目的地</p><h2 class="text-3xl font-black text-slate-900 leading-tight mb-4" x-text="currentTaxi.jpName"></h2><div class="bg-slate-100 p-4 rounded-xl"><p class="text-lg font-bold text-slate-700 font-mono" x-text="currentTaxi.address"></p></div></div></div><button @click="speak(currentTaxi.address)" class="mt-8 w-full bg-yellow-400 text-black font-bold py-4 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-md"><i class="ph-fill ph-speaker-high text-xl"></i> 唸出地址</button></div>
    <div x-show="showAddModal" class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl relative" @click.stop><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold text-slate-800">新增購物項目</h3><button @click="showAddModal = false" class="bg-gray-100 p-2 rounded-full"><i class="ph-bold ph-x"></i></button></div><div class="space-y-3"><div><label class="text-xs font-bold text-slate-400 uppercase ml-1">類別</label><select x-model="newItem.cat" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold text-slate-700"><template x-for="(items, category) in prepData.shopping" :key="category"><option :value="category" x-text="category"></option></template></select></div><div><label class="text-xs font-bold text-slate-400 uppercase ml-1">商品名稱</label><input x-model="newItem.name" type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold text-slate-700"></div><div><label class="text-xs font-bold text-slate-400 uppercase ml-1">備註</label><input x-model="newItem.desc" type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-500"></div><button @click="addItem()" class="w-full bg-orange-400 text-white font-bold py-3 rounded-xl mt-2 active:scale-95 transition-transform shadow-md">確認新增</button></div></div>
    <div x-show="showMoneyModal" class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl relative" @click.stop><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold text-slate-800">記一筆 💸</h3><button @click="showMoneyModal = false" class="bg-gray-100 p-2 rounded-full"><i class="ph-bold ph-x"></i></button></div><div class="space-y-3"><div><label class="text-xs font-bold text-slate-400 uppercase ml-1">項目名稱</label><input x-model="newMoney.title" type="text" placeholder="午餐 / 伴手禮" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-base font-bold text-slate-700 outline-none focus:border-blue-500"></div><div><label class="text-xs font-bold text-slate-400 uppercase ml-1">金額 (日幣)</label><input x-model="newMoney.amount" type="number" inputmode="numeric" placeholder="¥" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-xl font-mono font-bold text-slate-700 outline-none focus:border-blue-500"></div><div><label class="text-xs font-bold text-slate-400 uppercase ml-1">分類</label><div class="grid grid-cols-4 gap-2"><button @click="newMoney.cat = 'food'" class="py-2 rounded-lg text-xs font-bold border" :class="newMoney.cat === 'food' ? 'bg-orange-100 border-orange-400 text-orange-600' : 'bg-white border-slate-200 text-slate-400'">飲食</button><button @click="newMoney.cat = 'shop'" class="py-2 rounded-lg text-xs font-bold border" :class="newMoney.cat === 'shop' ? 'bg-pink-100 border-pink-400 text-pink-600' : 'bg-white border-slate-200 text-slate-400'">購物</button><button @click="newMoney.cat = 'traffic'" class="py-2 rounded-lg text-xs font-bold border" :class="newMoney.cat === 'traffic' ? 'bg-blue-100 border-blue-400 text-blue-600' : 'bg-white border-slate-200 text-slate-400'">交通</button><button @click="newMoney.cat = 'other'" class="py-2 rounded-lg text-xs font-bold border" :class="newMoney.cat === 'other' ? 'bg-gray-100 border-gray-400 text-gray-600' : 'bg-white border-slate-200 text-slate-400'">其他</button></div></div><button @click="addMoney()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl mt-2 active:scale-95 transition-transform shadow-md">儲存紀錄</button></div></div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        window.tripData = function() {
            // Data ... (Prep data same as before)
            const defaultPrepData = { ticketsWallet: { 'Skyliner': '', 'Disney': '', 'Hotel': '', 'VJW': '' }, tickets: [ { name: 'N\'EX 成田特快', desc: '機場 ➔ 新宿', link: 'https://www.jreast.co.jp/multi/zh-CHT/nex/' }, { name: 'Skyliner', desc: '上野 ➔ 機場', link: 'https://www.keisei.co.jp/keisei/tetudou/skyliner/tc/' }, { name: '箱根周遊券 (2日)', desc: '新宿小田急旅遊中心', link: 'https://www.odakyu.jp/tc/passes/hakone/' }, { name: '浪漫特快 (特急券)', desc: '需劃位 (展望席)', link: 'https://www.web-odakyu.com/e-romancecar/' }, { name: '蕃 YORONIKU', desc: '2/1 搶訂 18:30', link: 'https://tabelog.com/tw/tokyo/A1303/A130302/13211927/' }, { name: 'SHIBUYA SKY', desc: '預約 15:00-16:00', link: 'https://www.shibuya-scramble-square.com/sky/ticket/zh_tw/' } ], luggage: { '證件': [{ name: '護照', checked: false }, { name: 'Visit Japan Web (入境通關 QR Code)', checked: false }, { name: '日幣/信用卡', checked: false }, { name: '西瓜卡', checked: false }], '電子': [{ name: '網卡/eSim', checked: false }, { name: '行動電源', checked: false }, { name: '充電組', checked: false }], '生活': [{ name: '衣物 (5天)', checked: false }, { name: '好走的鞋', checked: false }, { name: '牙刷/藥品', checked: false }] }, shopping: { '藥妝與保健': [ { name: '合力他命 EX Plus', desc: '緩解疲勞 (每人限購)', checked: false }, { name: 'EVE 止痛藥 (藍/白)', desc: '頭痛生理痛神藥', checked: false }, { name: 'Wakamoto 若元錠', desc: '腸胃保健', checked: false }, { name: 'DHC 護唇膏', desc: '便宜好用', checked: false }, { name: '眼藥水 (Lycee/參天)', desc: '涼感/小花', checked: false } ], '零食與伴手禮': [ { name: 'Tokyo Banana', desc: '經典東京香蕉蛋糕', checked: false }, { name: 'NY Perfect Cheese', desc: '起司脆餅 (機場/東京站)', checked: false }, { name: 'Royce 生巧克力', desc: '需冷藏 (機場買)', checked: false }, { name: '白色戀人', desc: '北海道名產 (機場有)', checked: false } ], '服飾與其他': [ { name: 'Uniqlo 發熱衣', desc: '比台灣便宜很多', checked: false }, { name: 'New Balance', desc: '日本限定配色', checked: false } ] } };
            let initialData = defaultPrepData;
            let initialMoney = [];
            try { const s = localStorage.getItem('tokyo_2026_fixed_v8'); if(s) initialData = JSON.parse(s); const m = localStorage.getItem('tokyo_2026_money_v1'); if(m) initialMoney = JSON.parse(m); } catch(e){}

            return {
                activeIndex: 0, showChatModal: false, showKeySettings: false, swiperInstance: null,
                apiKey: localStorage.getItem('gemini_api_key') || '', apiKeyTemp: '', chatInput: '', isAiThinking: false,
                // v17: 預設填入一個推薦的模型，但允許修改
                modelId: localStorage.getItem('gemini_model_id') || 'gemini-3.1-flash-lite-preview', 
                modelIdTemp: '',
                chatHistory: JSON.parse(localStorage.getItem('chat_history') || '[]'),
                prepData: initialData, moneyList: initialMoney,
                weatherData: { tokyo: { temp: '--', icon: 'ph-dots-three', desc: '載入中' }, hakone: { temp: '--', icon: 'ph-dots-three', desc: '載入中' } },
                statusMsg: 'v17', toastText: '', showToast: false,
                modalOpen: false, showAddModal: false, showMoneyModal: false, showTaxiModal: false,
                currentPhrase: { jp: '', cn: '', romaji: '', cat: '' }, currentTaxi: { jpName: '', address: '' },
                newItem: { cat: '藥妝與保健', name: '', desc: '' }, newMoney: { title: '', amount: '', cat: 'food' },
                days: [ { shortTitle: 'D1 3/14', title: 'Day 1: 新宿', events: [] }, { shortTitle: 'D2 3/15', title: 'Day 2: 箱根', events: [] } ], // (請補上完整資料)
                phrases: { food:[], shop:[], help:[] }, // (請補上完整資料)

                get totalSpent() { return this.moneyList.reduce((acc, item) => acc + Number(item.amount), 0); },

                initApp() { 
                    this.initWeather(); 
                    this.modelIdTemp = this.modelId; // Init temp model
                    this.$nextTick(() => { this.swiperInstance = new Swiper(".mySwiper", { autoHeight: true, spaceBetween: 20 }); }); 
                },

                openChat() { this.showChatModal = true; this.$nextTick(() => this.scrollToBottom()); },
                
                saveSettings() {
                    if (this.apiKeyTemp.trim().length > 10) {
                        this.apiKey = this.apiKeyTemp.trim();
                        localStorage.setItem('gemini_api_key', this.apiKey);
                    }
                    if (this.modelIdTemp.trim().length > 0) {
                        this.modelId = this.modelIdTemp.trim();
                        localStorage.setItem('gemini_model_id', this.modelId);
                    }
                    this.showKeySettings = false;
                    this.toast('設定已儲存');
                },
                
                async sendChat() {
                    if (!this.chatInput.trim()) return;
                    if (!this.apiKey) { alert('請設定 API Key'); this.showKeySettings = true; return; }

                    const userMsg = this.chatInput;
                    this.chatInput = '';
                    this.pushMsg('user', userMsg);
                    this.isAiThinking = true;

                    try {
                        // 使用 Google SDK + 自訂模型 ID
                        const genAI = new GoogleGenerativeAI(this.apiKey);
                        // 關鍵：使用使用者輸入的 Model ID
                        const model = genAI.getGenerativeModel({ model: this.modelId });

                        const context = "你是一個專業的東京導遊。這是使用者的行程表（請依此回答）：" + JSON.stringify(this.days);
                        const prompt = `${context}\n\n使用者問：${userMsg}`;

                        const result = await model.generateContent(prompt);
                        const response = await result.response;
                        const text = response.text();

                        this.pushMsg('ai', text);

                    } catch (error) {
                        console.error(error);
                        let errStr = error.toString();
                        if (errStr.includes("404")) errStr = `找不到模型 "${this.modelId}"。請到設定更改為 gemini-1.5-flash 或 gemini-3.1-pro-review 試試。`;
                        this.pushMsg('ai', `❌ Error: ${errStr}`, true);
                    } finally {
                        this.isAiThinking = false;
                    }
                },

                // (Helpers & Other Functions remain same as v16)
                pushMsg(role, content, isError = false) { const id = Date.now(); this.chatHistory.push({ id, role, content, isError, time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) }); localStorage.setItem('chat_history', JSON.stringify(this.chatHistory)); this.$nextTick(() => this.scrollToBottom()); return id; },
                scrollToBottom() { const c = document.getElementById('chatContainer'); if(c) c.scrollTop = c.scrollHeight; },
                renderMarkdown(text) { return marked.parse(text); },
                toast(t) { this.toastText = t; this.showToast = true; setTimeout(() => this.showToast = false, 2000); },
                
                // ... (請務必將 v15 的完整 days, phrases, weather 等邏輯複製過來) ...
                async initWeather() { await this.fetchW(35.6895, 139.6917, 'tokyo'); await this.fetchW(35.2380, 139.0460, 'hakone'); },
                async fetchW(lat, lon, key) { try { const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Asia%2FTokyo`); const d = await r.json(); const c = d.current_weather.weathercode; const t = Math.round(d.current_weather.temperature); let i = 'ph-sun'; if(c>=1) i='ph-cloud'; this.weatherData[key] = { temp: `${t}°C`, icon: i, desc: '' }; } catch { this.weatherData[key] = { temp: '-', icon: 'ph-warning', desc: '離線' }; } },
                getCurrentWeather() { if (this.activeIndex === 2 || this.activeIndex === 3) return { ...this.weatherData.hakone, loc: '箱根' }; return { ...this.weatherData.tokyo, loc: '東京' }; },
                slideTo(i) { this.swiperInstance.slideTo(i); },
                toggleCheck(item) { item.checked = !item.checked; this.saveChecks(); },
                saveChecks() { try { localStorage.setItem('tokyo_2026_fixed_v8', JSON.stringify(this.prepData)); } catch(e) {} },
                addMoney() { if(!this.newMoney.title || !this.newMoney.amount) return; this.moneyList.unshift({ title: this.newMoney.title, amount: this.newMoney.amount, cat: this.newMoney.cat, date: new Date().toLocaleDateString('zh-TW', {month:'numeric', day:'numeric'}) }); this.saveMoney(); this.showMoneyModal = false; this.$nextTick(() => this.updateSwiperHeight()); },
                saveMoney() { try { localStorage.setItem('tokyo_2026_money_v1', JSON.stringify(this.moneyList)); this.toastText = '已儲存'; this.triggerToast(); } catch(e) {} },
                deleteMoney(idx) { if(confirm('刪除？')) { this.moneyList.splice(idx, 1); this.saveMoney(); this.$nextTick(() => this.updateSwiperHeight()); } },
                resetMoney() { if(confirm('清空？')) { this.moneyList = []; this.saveMoney(); this.$nextTick(() => this.updateSwiperHeight()); } },
                getMoneyIcon(cat) { const map = { 'food': { icon: 'ph-bowl-food', bg: 'bg-orange-100 text-orange-600' }, 'shop': { icon: 'ph-shopping-bag', bg: 'bg-pink-100 text-pink-600' }, 'traffic': { icon: 'ph-train', bg: 'bg-blue-100 text-blue-600' }, 'other': { icon: 'ph-dots-three-circle', bg: 'bg-gray-100 text-gray-600' } }; return map[cat] || map['other']; },
                exportShopping() { let text = "🛍️ 東京戰利品清單\n"; for (const [cat, items] of Object.entries(this.prepData.shopping)) { if (items.length > 0) { text += `\n【${cat}】\n`; items.forEach(item => { text += `${item.checked ? "✅" : "⬜"} ${item.name} ${item.desc ? '('+item.desc+')' : ''}\n`; }); } } this.copyToClipboard(text); },
                exportMoney() { let text = "💸 東京消費紀錄\n"; text += `📅 日期: ${new Date().toLocaleDateString()}\n`; text += `💰 總支出: ¥${this.totalSpent.toLocaleString()}\n------------------\n`; this.moneyList.forEach(item => { text += `${item.date} | ${item.title}: ¥${Number(item.amount).toLocaleString()}\n`; }); this.copyToClipboard(text); },
                copyToClipboard(text) { if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(text).then(() => { this.toastText = '已複製'; this.triggerToast(); }); } else { let ta = document.createElement("textarea"); ta.value = text; ta.style.position="fixed"; ta.style.left="-9999px"; document.body.appendChild(ta); ta.focus(); ta.select(); try { document.execCommand('copy'); this.toastText = '已複製'; this.triggerToast(); } catch (err) {} document.body.removeChild(ta); } },
                resetData() { if(confirm('重置清單？')) { this.prepData = JSON.parse(JSON.stringify(defaultPrepData)); this.saveChecks(); this.$nextTick(() => this.updateSwiperHeight()); } },
                triggerToast() { this.showToast = false; setTimeout(() => this.showToast = true, 50); setTimeout(() => this.showToast = false, 2000); },
                openAddModal() { this.newItem = { cat: '藥妝與保健', name: '', desc: '' }; this.showAddModal = true; },
                addItem() { if (!this.newItem.name) return; this.prepData.shopping[this.newItem.cat].push({ name: this.newItem.name, desc: this.newItem.desc || '新增項目', checked: false }); this.saveChecks(); this.showAddModal = false; this.$nextTick(() => this.updateSwiperHeight()); },
                deleteItem(cat, idx) { if(confirm('刪除？')) { this.prepData.shopping[cat].splice(idx, 1); this.saveChecks(); this.$nextTick(() => this.updateSwiperHeight()); } },
                updateSwiperHeight() { setTimeout(() => { this.swiperInstance.updateAutoHeight(300); this.swiperInstance.update(); }, 100); },
                openTaxi(event) { if (event.taxi) { this.currentTaxi = event.taxi; this.showTaxiModal = true; } },
                speak(text) { if ('speechSynthesis' in window) { const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP'; u.rate = 0.9; window.speechSynthesis.speak(u); } else { alert('不支援發音'); } },
                openPhrase(p, catName) { const catMap = { 'food': '餐廳', 'shop': '購物', 'help': '緊急' }; this.currentPhrase = { ...p, cat: catMap[catName] }; this.modalOpen = true; },
                
                // Days Data (保持完整)
                days: [ { shortTitle: 'D1 3/14', title: 'Day 1: 新宿', events: [] }, { shortTitle: 'D2 3/15', title: 'Day 2: 箱根', events: [] } ] // (請補上完整 days)
            }
        }
    </script>
</body>
</html>
