<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="東京之旅">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">
    
    <title>2026 東京賞櫻 (v42 穩定航班版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F2F2F7; padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.98); border-bottom: 1px solid rgba(0,0,0,0.05); padding-top: calc(env(safe-area-inset-top) + 20px); padding-bottom: 10px; position: fixed; top: 0; left: 0; right: 0; z-index: 50; }
        main { padding-top: calc(env(safe-area-inset-top) + 180px); padding-bottom: 100px; min-height: 100vh; }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; margin-bottom: 20px; transition: transform 0.2s; }
        .tab-btn { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); white-space: nowrap; border-radius: 9999px; padding: 8px 16px; font-size: 13px; font-weight: bold; scroll-snap-align: center; }
        .tab-active { background-color: #FF8BA7; color: white; transform: scale(1.05); box-shadow: 0 4px 12px rgba(255, 139, 167, 0.3); }
        .tab-inactive { background-color: white; color: #8E8E93; border: 1px solid #F2F2F7; }
        .swiper-slide { height: auto; min-height: 80vh; }
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .chat-user { background: #3B82F6; color: white; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
        .chat-ai { background: #F3F4F6; color: #1F2937; border-bottom-left-radius: 4px; align-self: flex-start; margin-right: auto; }
        .timeline-line { position: absolute; left: 24px; top: 10px; bottom: -10px; width: 2px; background: #E5E5EA; z-index: 0; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="text-slate-700" x-data="tripData()" x-init="initApp()">

    <div x-show="showToast" class="fixed top-safe-top right-4 z-[9999] bg-black/70 text-white px-4 py-2 rounded-full text-xs font-bold backdrop-blur-md flex items-center gap-2" style="top: calc(env(safe-area-inset-top) + 20px);" x-cloak>
        <i class="ph-bold ph-check-circle text-green-400"></i> <span x-text="toastText"></span>
    </div>

    <button @click="openChat()" class="fixed bottom-6 right-6 z-[5000] w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full shadow-xl flex items-center justify-center text-white active:scale-90 transition-transform border-4 border-white/20">
        <i class="ph-fill ph-robot text-2xl"></i>
    </button>

    <header class="glass-nav">
        <div class="px-4">
            <div class="flex justify-between items-center mb-4">
                <div @click="enableSimulateMode()"><h1 class="text-xl font-bold text-slate-800">2026 東京賞櫻 🌸</h1><p class="text-[10px] text-slate-400 font-bold uppercase">JL802 & JL809 航班版</p></div>
                <div class="bg-slate-50 border border-slate-200 rounded-2xl px-3 py-1.5 flex items-center gap-2">
                    <i :class="getCurrentWeather().icon + ' text-xl text-sky-500'"></i>
                    <div class="text-left"><div class="text-[10px] text-slate-400 font-bold" x-text="getCurrentWeather().loc"></div><div class="text-sm font-bold text-slate-800" x-text="getCurrentWeather().temp"></div></div>
                </div>
            </div>
            <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-2" id="tabContainer">
                <button @click="slideTo(0)" id="tab-0" class="tab-btn flex-shrink-0" :class="activeIndex === 0 ? 'tab-active' : 'tab-inactive'">行前</button>
                <button @click="slideTo(1)" id="tab-1" class="tab-btn flex-shrink-0" :class="activeIndex === 1 ? 'tab-active' : 'tab-inactive'">資訊</button>
                <button @click="slideTo(2)" id="tab-2" class="tab-btn flex-shrink-0" :class="activeIndex === 2 ? 'tab-active' : 'tab-inactive'">記帳</button>
                <template x-for="(day, index) in days" :key="index">
                    <button @click="slideTo(index + 3)" :id="'tab-' + (index + 3)" class="tab-btn flex-shrink-0" :class="activeIndex === (index + 3) ? 'tab-active' : 'tab-inactive'"><span x-text="day.shortTitle"></span></button>
                </template>
            </div>
        </div>
    </header>

    <main class="px-0">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide px-4">
                    <h3 class="text-sm font-bold text-slate-400 mb-3 ml-1 uppercase">預約與清單</h3>
                    <div class="grid gap-3 mb-8">
                        <template x-for="ticket in prepData.tickets"><div class="ios-card p-4 flex justify-between items-center"><div><div class="font-bold text-slate-800" x-text="ticket.name"></div><div class="text-xs text-slate-400 mt-0.5" x-text="ticket.desc"></div></div><a :href="ticket.link" target="_blank" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full text-xs font-bold active:bg-slate-200">查看</a></div></template>
                    </div>
                    <div class="flex justify-between items-end mb-3 ml-1"><h3 class="text-sm font-bold text-orange-400">🛍️ 必買清單</h3><button @click="openAddModal()" class="text-xs font-bold text-white bg-orange-400 px-3 py-1 rounded-full shadow">+ 新增</button></div>
                    <div class="ios-card overflow-hidden mb-8"><template x-for="(items, category) in prepData.shopping"><div class="border-b border-gray-100 last:border-0" x-show="items.length > 0"><div class="bg-gray-50 px-4 py-2 text-[10px] font-bold text-slate-400 uppercase" x-text="category"></div><template x-for="(item, idx) in items"><div @click="toggleCheck(item)" class="flex items-center justify-between px-4 py-3 active:bg-gray-50"><div class="flex items-center gap-3"><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center" :class="item.checked ? 'bg-orange-400 border-orange-400' : 'border-gray-300'"><i x-show="item.checked" class="ph-bold ph-check text-white text-sm"></i></div><span class="text-sm font-bold" :class="item.checked ? 'line-through opacity-40' : ''" x-text="item.name"></span></div><button @click.stop="deleteItem(category, idx)" class="p-2 text-slate-300"><i class="ph-bold ph-trash"></i></button></div></template></div></template></div>
                </div>

                <div class="swiper-slide px-4">
                    <div class="ios-card p-4 mb-6 bg-slate-800 text-white"><div class="flex items-center gap-2 mb-4"><i class="ph-fill ph-ticket text-yellow-400 text-xl"></i><h3 class="font-bold">票券收納夾</h3></div><div class="space-y-3"><template x-for="(val, key) in prepData.ticketsWallet"><div class="bg-slate-700/50 rounded-xl p-3 flex justify-between items-center"><div class="flex-1 mr-2"><div class="text-[10px] text-slate-400 uppercase font-bold" x-text="key"></div><input type="text" x-model="prepData.ticketsWallet[key]" @change="saveChecks()" placeholder="..." class="bg-transparent w-full text-sm font-mono font-bold outline-none text-white"></div><button @click="copyToClipboard(prepData.ticketsWallet[key])" class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center"><i class="ph-bold ph-copy text-slate-300"></i></button></div></template></div></div>
                    
                    <div class="ios-card p-4">
                        <div class="flex items-center gap-2 mb-4"><div class="w-8 h-8 rounded-full bg-pink-100 flex items-center justify-center text-pink-500"><i class="ph-fill ph-translate"></i></div><h3 class="font-bold text-slate-800">手指日文</h3></div>
                        <div class="flex bg-slate-100 rounded-lg p-1 mb-4">
                            <button @click="phraseTab = 'food'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'food' ? 'bg-white shadow text-slate-800' : 'text-slate-400'">餐廳</button>
                            <button @click="phraseTab = 'shop'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'shop' ? 'bg-white shadow text-slate-800' : 'text-slate-400'">購物</button>
                            <button @click="phraseTab = 'help'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'help' ? 'bg-white shadow text-red-500' : 'text-slate-400'">緊急</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2"><template x-for="p in phrases[phraseTab]"><div @click="openPhrase(p, phraseTab)" class="bg-gray-50 border border-gray-100 rounded-xl p-3 active:bg-gray-100 active:scale-95 transition-transform text-center"><div class="text-sm font-bold text-slate-800 truncate" x-text="p.jp"></div><div class="text-[10px] text-slate-500 mt-1 flex justify-center items-center gap-1"><span x-text="p.cn"></span> <i class="ph-bold ph-speaker-high text-pink-400"></i></div></div></template></div>
                    </div>
                </div>

                <div class="swiper-slide px-4">
                    <div class="ios-card bg-slate-800 text-white p-6 mb-6 shadow-xl relative overflow-hidden"><div class="text-xs text-slate-400 mb-1 font-bold">總花費 (日幣)</div><div class="text-4xl font-black mb-2">¥ <span x-text="totalSpent.toLocaleString()"></span></div><button @click="showMoneyModal = true" class="absolute bottom-4 right-4 bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform"><i class="ph-bold ph-plus text-xl"></i></button></div>
                    <div class="space-y-3"><template x-for="(item, idx) in moneyList"><div class="ios-card p-3 flex justify-between items-center"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full flex items-center justify-center text-lg" :class="getMoneyIcon(item.cat).bg"><i :class="getMoneyIcon(item.cat).icon"></i></div><div><div class="font-bold text-slate-800 text-sm" x-text="item.title"></div><div class="text-[10px] text-slate-400" x-text="item.date"></div></div></div><div class="font-bold font-mono text-slate-800">¥<span x-text="Number(item.amount).toLocaleString()"></span></div></div></template></div>
                </div>

                <template x-for="(day, index) in days" :key="index">
                    <div class="swiper-slide px-4">
                        <div class="ios-card p-4 text-center mb-4"><h2 class="text-lg font-bold text-slate-800" x-text="day.title"></h2><div class="flex justify-center mt-2 gap-2"><template x-if="day.hotel !== 'Sweet Home'"><a :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(day.hotel)" target="_blank" class="bg-slate-100 px-3 py-1 rounded-full text-xs font-bold text-slate-600 flex items-center gap-1"><i class="ph-fill ph-bed text-indigo-500"></i><span x-text="day.hotel"></span></a></template><template x-if="day.hotel === 'Sweet Home'"><div class="bg-pink-50 px-3 py-1 rounded-full text-xs font-bold text-pink-600 flex items-center gap-1"><i class="ph-fill ph-house"></i>Sweet Home</div></template></div></div>
                        <template x-if="day.hasOptions"><div class="flex justify-center mb-6"><div class="bg-white p-1 rounded-xl flex gap-1 shadow-sm"><button @click="day.selectedOption = 'A'; $nextTick(() => swiperInstance.updateAutoHeight())" class="px-4 py-2 rounded-lg text-sm font-bold transition-all" :class="day.selectedOption === 'A' ? 'bg-slate-800 text-white shadow' : 'text-slate-400 hover:text-slate-600'" x-text="day.optionALabel"></button><button @click="day.selectedOption = 'B'; $nextTick(() => swiperInstance.updateAutoHeight())" class="px-4 py-2 rounded-lg text-sm font-bold transition-all" :class="day.selectedOption === 'B' ? 'bg-pink-500 text-white shadow' : 'text-slate-400 hover:text-slate-600'" x-text="day.optionBLabel"></button></div></div></template>
                        <div class="relative pl-4">
                            <div class="timeline-line"></div>
                            <div class="space-y-6">
                                <template x-for="(event, eIdx) in (day.hasOptions ? day.options[day.selectedOption] : day.events)" :key="event.time">
                                    <div class="relative pl-10">
                                        <div class="absolute left-0 top-0 flex flex-col items-center z-10"><div class="w-12 h-12 rounded-full border-4 border-[#F2F2F7] flex items-center justify-center shadow-sm" :class="getIconColor(event.type)"><i :class="getIconClass(event.type) + ' text-white text-lg'"></i></div></div>
                                        <div class="ios-card overflow-hidden">
                                            <div class="p-4" @click="event.expanded = !event.expanded; $nextTick(() => swiperInstance.updateAutoHeight())">
                                                <div class="flex items-center gap-2 mb-1"><span class="text-xs font-black text-slate-300 font-mono" x-text="event.time"></span><template x-if="event.tag"><span class="text-[10px] font-bold px-2 py-0.5 rounded-full" :class="getTagColor(event.tag)" x-text="event.tag"></span></template></div>
                                                <h3 class="text-lg font-bold text-slate-800 mb-1" x-text="event.name"></h3>
                                                <p class="text-sm text-slate-500 line-clamp-2" x-text="event.desc"></p>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="modalOpen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/60 p-6 backdrop-blur-sm" style="display:none;" @click.self="modalOpen = false"><div class="bg-white w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl relative"><button @click="modalOpen = false" class="absolute top-4 right-4 p-2"><i class="ph-bold ph-x text-lg"></i></button><span class="inline-block bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-xs font-bold mb-4" x-text="currentPhrase.cat"></span><h2 class="text-3xl font-bold text-slate-800 mb-2 leading-tight" x-text="currentPhrase.jp"></h2><p class="text-slate-400 text-sm font-mono mb-6" x-text="currentPhrase.romaji"></p><div class="border-t pt-4 mb-4"><p class="text-xl font-bold text-slate-600" x-text="currentPhrase.cn"></p></div><button @click="speak(currentPhrase.jp)" class="w-full bg-slate-100 text-slate-600 font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:bg-slate-200 transition-colors"><i class="ph-fill ph-speaker-high text-xl"></i> 唸給對方聽</button></div></div>
    
    <div x-show="showChatModal" x-cloak class="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm" @click.self="showChatModal = false">
        <div class="bg-white w-full h-[85vh] max-w-md rounded-3xl shadow-2xl relative flex flex-col overflow-hidden">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600"><i class="ph-fill ph-robot"></i></div><div class="font-bold text-slate-800 text-sm">Sakura Bot</div></div>
                <div class="flex gap-2"><button @click="showKeySettings = !showKeySettings" class="p-2 text-slate-400"><i class="ph-bold ph-gear"></i></button><button @click="showChatModal = false" class="p-2 text-slate-400"><i class="ph-bold ph-x"></i></button></div>
            </div>
            <div x-show="showKeySettings || !apiKey" class="bg-slate-100 p-4 border-b border-slate-200">
                <label class="text-xs font-bold text-slate-500 mb-1">API Key</label>
                <input type="text" x-model="apiKeyTemp" class="w-full rounded-lg border p-2 text-xs mb-3 bg-white outline-none">
                <button @click="saveSettings()" class="bg-indigo-500 text-white text-xs font-bold px-3 py-2 rounded-lg w-full shadow-md">儲存</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-white flex flex-col" id="chatContainer">
                <template x-for="msg in chatHistory"><div class="flex flex-col w-full mb-4"><div class="chat-bubble shadow-sm markdown-body" :class="msg.role === 'user' ? 'chat-user' : 'chat-ai'" x-html="renderMarkdown(msg.content)"></div></div></template>
                <div x-show="isAiThinking" class="chat-bubble chat-ai w-16 flex items-center justify-center"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
            </div>
            <div class="p-3 bg-slate-50 border-t border-slate-100 flex gap-2">
                <input type="text" x-model="chatInput" @keydown.enter="sendChat()" placeholder="問問我行程..." class="flex-1 bg-white border rounded-full px-4 py-2 text-sm outline-none">
                <button @click="sendChat()" :disabled="!chatInput || isAiThinking" class="w-10 h-10 bg-indigo-500 rounded-full text-white flex items-center justify-center shadow-md active:scale-95 transition-all"><i class="ph-bold ph-paper-plane-right"></i></button>
            </div>
        </div>
    </div>

    <script>
    const TOKYO_DAYS = [
        {

        },

            "events": [

                { "time": "11:00", "type": "activity", "name": "箱根海盜船", "desc": "桃源台 ➔ 元箱根港。", "location": "Togendai" },
                { "time": "15:00", "type": "transport", "name": "返回東京", "desc": "浪漫特快回新宿轉山手線。", "location": "Hakone Yumoto" },

            ]
        },
        {
            "shortTitle": "D4 3/17(二)", "title": "Day 4: 澀谷/南青山", "hotel": "APA Hotel Yamanote Otsuka Tower",
            "events": [
                { "time": "11:00", "type": "activity", "name": "原宿/表參道", "desc": "逛逛明治神宮與表參道。", "location": "Harajuku" },
                { "time": "14:30", "type": "activity", "name": "SHIBUYA SKY", "desc": "展望台看夕陽與東京鐵塔。", "location": "Shibuya", "tag": "需預約" },
                { "time": "17:00", "type": "food", "name": "南青山 Yoroniku", "desc": "頂級燒肉預約席。", "location": "Minami Aoyama", "tag": "需搶位" },

            ]
        },
        {

            "hasOptions": true, "selectedOption": "A", "optionALabel": "方案A: 淺草雷門", "optionBLabel": "方案B: 千鳥之淵",
            "options": {
                "A": [
                    { "time": "09:00", "type": "activity", "name": "淺草雷門", "desc": "仲見世通、雷門拍照。", "location": "Senso-ji" },
                    { "time": "13:30", "type": "food", "name": "上野最後採買", "desc": "阿美橫丁零食與藥妝。", "location": "Ueno Ameyoko" },
                    { "time": "15:00", "type": "transport", "name": "抵達成田機場 T2", "desc": "JL809 提前 3 小時報到。", "location": "NRT Terminal 2" },

                ],
                "B": [
                    { "time": "09:00", "type": "sakura", "name": "千鳥之淵", "desc": "護城河划船賞櫻。", "location": "Chidorigafuchi" },
                    { "time": "13:30", "type": "food", "name": "上野最後採買", "desc": "阿美橫丁零食與藥妝。", "location": "Ueno Ameyoko" },
                    { "time": "15:00", "type": "transport", "name": "抵達成田機場 T2", "desc": "JL809 提前 3 小時報到。", "location": "NRT Terminal 2" },
                    { "time": "18:05", "type": "flight", "name": "JL809 起飛", "desc": "東京 NRT ➔ 台北 TPE。", "location": "NRT Airport" },
                    { "time": "21:10", "type": "flight", "name": "抵達台北 TPE", "desc": "結束賞櫻之旅。", "location": "TPE Airport" }
                ]
            },
            "events": []
        }
    ];

    function tripData() {
        const defaultPrepData = { ticketsWallet: { 'Skyliner': '', 'VJW': '' }, tickets: [ { name: 'N\'EX', desc: '機場 ➔ 新宿', link: 'https://www.jreast.co.jp/multi/zh-CHT/nex/' }, { name: '箱根周遊券', desc: '2日券', link: 'https://www.odakyu.jp/tc/passes/hakone/' } ], shopping: { '藥妝': [], '零食': [] }, luggage: { '證件': [{ name: '護照', checked: false }] } };
        let initialData = defaultPrepData;
        try { const s = localStorage.getItem('tokyo_2026_fixed_v8'); if(s && s !== "undefined") initialData = JSON.parse(s); } catch(e){}

        return {
            activeIndex: 0, showChatModal: false, showKeySettings: false, swiperInstance: null,
            apiKey: localStorage.getItem('gemini_api_key') || '', apiKeyTemp: '', chatInput: '', isAiThinking: false,
            modelId: localStorage.getItem('gemini_model_id') || 'gemini-2.5-flash', modelIdTemp: '',
            availableModels: [],
            chatHistory: JSON.parse(localStorage.getItem('chat_history') || '[]'),
            prepData: initialData, moneyList: [], days: TOKYO_DAYS,
            weatherData: { tokyo: { temp: '--', icon: 'ph-sun' } },
            toastText: '', showToast: false, modalOpen: false, showAddModal: false, showMoneyModal: false,
            currentPhrase: { jp: '', cn: '', romaji: '', cat: '' }, newItem: { cat: '藥妝', name: '' }, newMoney: { title: '', amount: '', cat: 'food' },
            phraseTab: 'food',
            phrases: { food: [ { jp: 'メニューをください', cn: '請給我菜單', romaji: 'Menyuu o kudasai' }, { jp: 'お會計お願いします', cn: '買單', romaji: 'Okaikei onegaishimasu' } ], shop: [ { jp: 'いくらですか？', cn: '請問多少錢？', romaji: 'Ikura desuka?' } ], help: [ { jp: 'トイレはどこ？', cn: '廁所在哪？', romaji: 'Toire wa doko?' } ] },

            get totalSpent() { return this.moneyList.reduce((acc, item) => acc + Number(item.amount), 0); },

            initApp() { 
                this.modelIdTemp = this.modelId; this.apiKeyTemp = this.apiKey;
                setTimeout(() => {
                    this.swiperInstance = new Swiper(".mySwiper", { 
                        autoHeight: true, spaceBetween: 20, observer: true, observeParents: true,
                        on: { slideChange: (s) => { this.activeIndex = s.activeIndex; this.centerTab(s.activeIndex); } } 
                    });
                }, 500); 
            },

            centerTab(index) {
                const container = document.getElementById('tabContainer');
                const tabBtn = document.getElementById(`tab-${index}`);
                if (container && tabBtn) { container.scrollTo({ left: tabBtn.offsetLeft - (container.clientWidth / 2) + (tabBtn.clientWidth / 2), behavior: 'smooth' }); }
            },

            speak(text) { 
                if ('speechSynthesis' in window) { 
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP'; u.rate = 0.9;
                    window.speechSynthesis.speak(u); 
                } 
            },

            openPhrase(p, catName) { 
                const catMap = { 'food': '餐廳', 'shop': '購物', 'help': '緊急' };
                this.currentPhrase = { ...p, cat: catMap[catName] };
                this.modalOpen = true; 
            },

            saveSettings() {
                localStorage.setItem('gemini_api_key', this.apiKey = this.apiKeyTemp.trim());
                localStorage.setItem('gemini_model_id', this.modelId = this.modelIdTemp.trim());
                this.showKeySettings = false; this.toast('設定已儲存');
            },

            async sendChat() { 
                if(!this.chatInput.trim()) return;
                const msg = this.chatInput; this.chatInput = '';
                this.chatHistory.push({ role: 'user', content: msg });
                this.isAiThinking = true;
                const context = JSON.stringify(this.days.map(d => ({ title: d.title, events: d.hasOptions ? d.options[d.selectedOption].map(e => e.name) : d.events.map(e => e.name) })));
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${this.modelId}:generateContent?key=${this.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: `你是東京導遊。這是行程：\n${context}\n\n[規則] 不要主動唸清單，簡短回答問候。使用者問：${msg}` }] }] })
                    });
                    const data = await res.json();
                    this.chatHistory.push({ role: 'ai', content: data.candidates[0].content.parts[0].text });
                } catch (e) { this.chatHistory.push({ role: 'ai', content: '錯誤: ' + e.message }); }
                finally { this.isAiThinking = false; this.$nextTick(() => { const c = document.getElementById('chatContainer'); c.scrollTop = c.scrollHeight; }); }
            },

            slideTo(i) { this.swiperInstance.slideTo(i); },
            toggleCheck(item) { item.checked = !item.checked; this.saveChecks(); },
            saveChecks() { localStorage.setItem('tokyo_2026_fixed_v8', JSON.stringify(this.prepData)); },
            addItem() { this.prepData.shopping[this.newItem.cat].push({ name: this.newItem.name, checked: false }); this.saveChecks(); this.showAddModal = false; },
            deleteItem(cat, idx) { this.prepData.shopping[cat].splice(idx, 1); this.saveChecks(); },
            toast(t) { this.toastText = t; this.showToast = true; setTimeout(() => this.showToast = false, 2000); },
            getCurrentWeather() { return { temp: '20°C', icon: 'ph-sun', loc: '東京' }; },
            getIconColor(t) { const c = { 'transport': 'bg-blue-500', 'food': 'bg-orange-400', 'activity': 'bg-slate-700', 'sakura': 'bg-pink-400', 'hotel': 'bg-indigo-500', 'flight': 'bg-sky-500' }; return c[t] || 'bg-slate-400'; },
            getIconClass(t) { const i = { 'transport': 'ph-bold ph-train', 'food': 'ph-bold ph-bowl-food', 'activity': 'ph-bold ph-camera', 'sakura': 'ph-fill ph-flower-lotus', 'hotel': 'ph-bold ph-bed', 'flight': 'ph-bold ph-airplane-tilt' }; return i[t] || 'ph-circle'; },
            getTagColor(t) { if(t==='需預約')return 'bg-red-100 text-red-600'; if(t==='必吃')return 'bg-orange-100 text-orange-600'; return 'bg-blue-100 text-blue-600'; },
            copyToClipboard(text) { navigator.clipboard.writeText(text); this.toast('已複製'); },
            renderMarkdown(text) { return marked.parse(text); },
            openChat() { this.showChatModal = true; },
            checkModels() { this.availableModels = ['gemini-1.5-flash', 'gemini-2.0-flash-exp', 'gemini-pro']; },
            startClock() {}, enableSimulateMode() {}, isCurrentEvent() { return false; }, autoNavigate() {}, resetData() {}, openTaxi() {}, openPhrase(p, catName) { const catMap = { 'food': '餐廳', 'shop': '購物', 'help': '緊急' }; this.currentPhrase = { ...p, cat: catMap[catName] }; this.modalOpen = true; }
        }
    }
    </script>
