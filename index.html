<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="東京之旅">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">
    
    <title>2026 東京賞櫻 (v20 黑盒診斷版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F2F2F7; padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); padding-top: calc(env(safe-area-inset-top) + 25px); padding-bottom: 15px; }
        main { padding-top: calc(env(safe-area-inset-top) + 200px); }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #FF8BA7; color: white; transform: scale(1.05); }
        .tab-inactive { background-color: white; color: #8E8E93; }
        .swiper { width: 100%; height: auto; }
        
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .chat-user { background: #3B82F6; color: white; border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
        .chat-ai { background: #F3F4F6; color: #1F2937; border-bottom-left-radius: 4px; align-self: flex-start; margin-right: auto; }
        .chat-error { background: #FEE2E2; color: #DC2626; border: 1px solid #FECACA; }
        
        /* v20 Debug Console */
        .console-box { background: #1e1e1e; color: #00ff00; font-family: 'Courier New', monospace; font-size: 10px; padding: 10px; border-radius: 8px; height: 120px; overflow-y: auto; margin-top: 10px; border: 1px solid #333; line-height: 1.4; white-space: pre-wrap; }
        .console-log { color: #aaa; }
        .console-err { color: #ff5555; font-weight: bold; }
        .console-success { color: #55ff55; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="text-slate-700" x-data="tripData()" x-init="initApp()">

    <div x-show="showToast" class="fixed top-safe-top right-4 z-[9999] bg-black/70 text-white px-4 py-2 rounded-full text-xs font-bold backdrop-blur-md flex items-center gap-2 toast-msg" style="top: calc(env(safe-area-inset-top) + 20px);" x-cloak>
        <i class="ph-bold ph-check-circle text-green-400"></i> <span x-text="toastText"></span>
    </div>

    <button @click="openChat()" class="fixed bottom-6 right-6 z-[5000] w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full shadow-xl flex items-center justify-center text-white active:scale-90 transition-transform border-4 border-white/20">
        <i class="ph-fill ph-robot text-2xl"></i>
        <div x-show="!apiKey" class="absolute top-0 right-0 w-4 h-4 bg-red-500 rounded-full border-2 border-white animate-bounce"></div>
    </button>

    <div x-show="showChatModal" x-cloak class="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm" @click.self="showChatModal = false">
        <div class="bg-white w-full h-[90vh] max-w-md rounded-3xl shadow-2xl relative flex flex-col overflow-hidden">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600"><i class="ph-fill ph-bug"></i></div>
                    <div><h3 class="font-bold text-slate-800 text-sm">Sakura Bot</h3><p class="text-[10px] text-green-500">v20 黑盒診斷版</p></div>
                </div>
                <div class="flex gap-2">
                    <button @click="showKeySettings = !showKeySettings" class="p-2 text-slate-400"><i class="ph-bold ph-gear"></i></button>
                    <button @click="showChatModal = false" class="p-2 text-slate-400"><i class="ph-bold ph-x"></i></button>
                </div>
            </div>

            <div x-show="showKeySettings || !apiKey" class="bg-slate-100 p-4 border-b border-slate-200" style="max-height: 50vh; overflow-y:auto;">
                <label class="text-xs font-bold text-slate-500 mb-1">Google Gemini API Key</label>
                <input type="text" x-model="apiKeyTemp" placeholder="AIza..." class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-3 bg-white outline-none">
                
                <label class="text-xs font-bold text-slate-500 mb-1">目前模型 ID</label>
                <input type="text" x-model="modelId" class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-2 bg-gray-200 font-mono" readonly>
                
                <button @click="checkModels()" class="w-full bg-blue-500 text-white text-xs font-bold py-2 rounded-lg mb-3 shadow"><i class="ph-bold ph-magnifying-glass"></i> 1. 偵測可用模型 (GET)</button>
                
                <div x-show="availableModels.length > 0" class="mb-3">
                    <p class="text-[10px] text-slate-500 mb-1">偵測到以下模型 (點擊套用):</p>
                    <div class="grid grid-cols-1 gap-1">
                        <template x-for="m in availableModels">
                            <button @click="modelId = m; log('已切換模型: ' + m); saveSettings()" class="text-left text-[10px] bg-white border border-slate-300 px-2 py-1.5 rounded truncate active:bg-slate-100">
                                👉 <span x-text="m"></span>
                            </button>
                        </template>
                    </div>
                </div>

                <button @click="saveSettings()" class="bg-indigo-500 text-white text-xs font-bold px-3 py-3 rounded-lg w-full shadow-md">儲存設定</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 bg-white flex flex-col" id="chatContainer">
                <div class="flex-1 space-y-4 min-h-[100px]">
                    <div x-show="chatHistory.length === 0" class="text-center text-slate-400 text-xs mt-4">
                        <p class="mb-2">除錯步驟：</p>
                        <ol class="list-decimal text-left inline-block pl-4 space-y-1">
                            <li>點右上角齒輪</li>
                            <li>按「1. 偵測可用模型」</li>
                            <li>點選一個模型</li>
                            <li>按下方「2. 測試連線」</li>
                        </ol>
                    </div>
                    <template x-for="msg in chatHistory">
                        <div class="flex flex-col w-full">
                            <div class="chat-bubble shadow-sm markdown-body" 
                                 :class="[msg.role === 'user' ? 'chat-user' : 'chat-ai', msg.isError ? 'chat-error' : '']" 
                                 x-html="renderMarkdown(msg.content)"></div>
                        </div>
                    </template>
                </div>

                <div class="mt-4 border-t pt-2">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-bold text-slate-400">工程師控制台 (Logs)</span>
                        <button @click="debugLogs=[]" class="text-[10px] text-slate-400 underline">清除</button>
                    </div>
                    <div class="console-box" id="consoleBox">
                        <template x-for="log in debugLogs">
                            <div :class="log.type === 'err' ? 'console-err' : (log.type === 'ok' ? 'console-success' : 'console-log')">> <span x-text="log.msg"></span></div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-slate-50 border-t border-slate-100 flex flex-col gap-2">
                <button @click="testSimpleChat()" class="w-full bg-green-500 text-white text-xs font-bold py-2 rounded-lg shadow active:scale-95 transition-transform"><i class="ph-bold ph-plugs-connected"></i> 2. 測試連線 (發送 "Hi" 不帶行程)</button>
                <div class="flex gap-2">
                    <input type="text" x-model="chatInput" @keydown.enter="sendChat()" placeholder="輸入訊息..." class="flex-1 bg-white border rounded-full px-4 py-2 text-sm outline-none">
                    <button @click="sendChat()" :disabled="isAiThinking" class="w-10 h-10 bg-indigo-500 rounded-full text-white flex items-center justify-center disabled:opacity-50"><i class="ph-bold ph-paper-plane-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <header class="fixed top-0 inset-x-0 z-50 glass-nav">
        <div class="px-4 py-3"><div class="flex justify-between items-center mb-3"><h1 class="text-xl font-bold text-slate-800">2026 東京賞櫻 (v20)</h1></div><div class="flex space-x-3 overflow-x-auto no-scrollbar pb-1"><button @click="slideTo(0)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 0 ? 'tab-active' : 'tab-inactive'">行前</button><button @click="slideTo(1)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 1 ? 'tab-active' : 'tab-inactive'">資訊</button><button @click="slideTo(2)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === 2 ? 'tab-active bg-emerald-500' : 'tab-inactive'">記帳</button><template x-for="(day, index) in days" :key="index"><button @click="slideTo(index + 3)" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold" :class="activeIndex === (index + 3) ? 'tab-active' : 'tab-inactive'"><span x-text="day.shortTitle"></span></button></template></div></div>
    </header>
    <main>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400">請使用 v19 的完整行程資料 (此處為 v20 診斷版)</div></div>
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400">資訊</div></div>
                <div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400">記帳</div></div>
                <template x-for="day in days"><div class="swiper-slide px-4 pb-24"><div class="ios-card p-4 text-center text-slate-400" x-text="day.title"></div></div></template>
            </div>
        </div>
    </main>

    <script>
        function tripData() {
            // Data Setup
            const defaultPrepData = { tickets: [], luggage: {}, shopping: {} };
            let initialData = defaultPrepData;
            try { const s = localStorage.getItem('tokyo_2026_fixed_v8'); if(s) initialData = JSON.parse(s); } catch(e){}

            return {
                activeIndex: 0, showChatModal: false, showKeySettings: false, swiperInstance: null,
                apiKey: localStorage.getItem('gemini_api_key') || '', apiKeyTemp: '', chatInput: '', isAiThinking: false,
                modelId: localStorage.getItem('gemini_model_id') || 'gemini-1.5-flash',
                modelIdTemp: '',
                chatHistory: [],
                debugLogs: [], // v20 Log Array
                availableModels: [],
                prepData: initialData, moneyList: [],
                toastText: '', showToast: false,
                modalOpen: false, showAddModal: false, showMoneyModal: false, showTaxiModal: false,
                
                initApp() { 
                    this.apiKeyTemp = this.apiKey;
                    this.$nextTick(() => { this.swiperInstance = new Swiper(".mySwiper", { autoHeight: true, spaceBetween: 20 }); }); 
                    this.log('App Ready. 請點擊機器人開始診斷。');
                },

                openChat() { this.showChatModal = true; this.$nextTick(() => this.scrollToBottom()); },
                
                // ==============================
                // v20 Logging System
                // ==============================
                log(msg, type = 'info') {
                    const time = new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
                    this.debugLogs.push({ msg: `[${time}] ${msg}`, type });
                    this.$nextTick(() => {
                        const box = document.getElementById('consoleBox');
                        if(box) box.scrollTop = box.scrollHeight;
                    });
                },

                saveSettings() {
                    if (this.apiKeyTemp.trim().length > 10) {
                        this.apiKey = this.apiKeyTemp.trim();
                        localStorage.setItem('gemini_api_key', this.apiKey);
                    }
                    if (this.modelId.trim().length > 0) {
                        localStorage.setItem('gemini_model_id', this.modelId);
                    }
                    this.showKeySettings = false;
                    this.log('設定已儲存。Key: ' + this.apiKey.substring(0,5) + '... | Model: ' + this.modelId, 'ok');
                },

                // 1. 偵測模型 (GET)
                async checkModels() {
                    const k = this.apiKeyTemp.trim();
                    if(!k) return alert('請先填入 Key');
                    this.log('正在偵測模型 (GET listModels)...');
                    this.availableModels = [];

                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
                        const data = await res.json();
                        
                        if(!res.ok) throw new Error(`${res.status} ${data.error?.message}`);

                        // 過濾並清理名稱
                        const validModels = data.models
                            .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                            .map(m => m.name.replace('models/', ''));

                        this.availableModels = validModels;
                        this.log(`偵測成功！找到 ${validModels.length} 個模型。`, 'ok');
                        this.log(`建議使用: ${validModels[0]}`);
                    } catch (e) {
                        this.log(`偵測失敗: ${e.message}`, 'err');
                    }
                },

                // 2. 測試簡單連線 (POST "Hi")
                async testSimpleChat() {
                    this.performChat("Hi", false);
                },

                // 3. 正常對話
                async sendChat() {
                    if(!this.chatInput.trim()) return;
                    const msg = this.chatInput;
                    this.chatInput = '';
                    this.pushMsg('user', msg);
                    this.performChat(msg, true);
                },

                // 通用發送邏輯
                async performChat(userMsg, withContext) {
                    if (!this.apiKey) { alert('請設定 API Key'); this.showKeySettings = true; return; }
                    this.isAiThinking = true;
                    
                    // 網址處理：確保不重複 models/ 前綴
                    const cleanModelId = this.modelId.replace('models/', '');
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${cleanModelId}:generateContent?key=${this.apiKey}`;
                    
                    this.log(`準備發送 POST 到: .../models/${cleanModelId}...`);

                    // Payload
                    let payload = {
                        contents: [{ role: "user", parts: [{ text: userMsg }] }]
                    };

                    if (withContext) {
                        const context = "你是一個導遊。這是行程：" + JSON.stringify(this.days);
                        payload.contents[0].parts[0].text = `${context}\n\n使用者：${userMsg}`;
                        this.log('已夾帶行程 Context');
                    } else {
                        this.log('測試模式：不夾帶行程資料');
                    }

                    try {
                        this.log('正在等待回應...');
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s Timeout

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeoutId);
                        this.log(`收到回應。Status: ${response.status}`);

                        if (!response.ok) {
                            const errJson = await response.json();
                            throw new Error(`${response.status} - ${errJson.error?.message || JSON.stringify(errJson)}`);
                        }

                        const data = await response.json();
                        if (!data.candidates || data.candidates.length === 0) {
                            this.log('API 回傳 Candidates 為空 (被安全阻擋?)', 'err');
                            throw new Error('No candidates');
                        }

                        const aiText = data.candidates[0].content.parts[0].text;
                        this.log('解析成功！', 'ok');
                        this.pushMsg('ai', aiText);

                    } catch (error) {
                        let errStr = error.toString();
                        if (error.name === 'AbortError') errStr = '連線逾時 (Timeout)';
                        this.log(`發生錯誤: ${errStr}`, 'err');
                        this.pushMsg('ai', `❌ 錯誤: ${errStr}`, true);
                    } finally {
                        this.isAiThinking = false;
                    }
                },

                pushMsg(role, content, isError = false) { const id = Date.now(); this.chatHistory.push({ id, role, content, isError, time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) }); localStorage.setItem('chat_history', JSON.stringify(this.chatHistory)); this.$nextTick(() => this.scrollToBottom()); return id; },
                scrollToBottom() { const c = document.getElementById('chatContainer'); if(c) c.scrollTop = c.scrollHeight; },
                renderMarkdown(text) { return marked.parse(text); },
                triggerToast() { this.showToast = false; setTimeout(() => this.showToast = true, 50); setTimeout(() => this.showToast = false, 2000); },
                slideTo(i) { this.swiperInstance.slideTo(i); },
                getCurrentWeather() { return { loc: '東京', temp: '20°C', icon: 'ph-sun' }; },
                toggleCheck(item) { item.checked = !item.checked; this.saveChecks(); },
                saveChecks() { try { localStorage.setItem('tokyo_2026_fixed_v8', JSON.stringify(this.prepData)); } catch(e) {} },
                resetData() { if(confirm('重置？')) { this.prepData = JSON.parse(JSON.stringify(defaultPrepData)); this.saveChecks(); } },
                
                days: [ { shortTitle: 'D1 3/14', title: 'Day 1: 新宿' }, { shortTitle: 'D2 3/15', title: 'Day 2: 箱根' }, { shortTitle: 'D3 3/16', title: 'Day 3: 海盜船' }, { shortTitle: 'D4 3/17', title: 'Day 4: 澀谷' }, { shortTitle: 'D5 3/18', title: 'Day 5: 上野' } ]
            }
        }
    </script>
</body>
</html>
