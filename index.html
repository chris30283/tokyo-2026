<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="東京之旅">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/480/cherry-blossom.png">
    
    <title>2026 東京賞櫻 (v41 語音修復版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F2F2F7; padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.98); border-bottom: 1px solid rgba(0,0,0,0.05); padding-top: calc(env(safe-area-inset-top) + 20px); padding-bottom: 10px; position: fixed; top: 0; left: 0; right: 0; z-index: 50; }
        main { padding-top: calc(env(safe-area-inset-top) + 180px); padding-bottom: 100px; min-height: 100vh; }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; margin-bottom: 20px; transition: transform 0.2s; }
        .tab-btn { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); white-space: nowrap; border-radius: 9999px; padding: 8px 16px; font-size: 13px; font-weight: bold; }
        .tab-active { background-color: #FF8BA7; color: white; transform: scale(1.05); box-shadow: 0 4px 12px rgba(255, 139, 167, 0.3); }
        .tab-inactive { background-color: white; color: #8E8E93; border: 1px solid #F2F2F7; }
        .swiper { width: 100%; height: auto; }
        .swiper-slide { height: auto; min-height: 80vh; padding-bottom: 50px; }
        .expand-content { transition: all 0.4s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; background-color: #F8FAFC; border-top: 1px solid #F1F5F9; }
        .expanded { max-height: 2000px; opacity: 1; }
        .active-event-card { border-left: 4px solid #F472B6; background: #FFF5F7; }
        .phrase-card { cursor: pointer !important; -webkit-tap-highlight-color: transparent; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="text-slate-700" x-data="tripData()" x-init="initApp()">

    <div x-show="showToast" class="fixed top-safe-top right-4 z-[9999] bg-black/70 text-white px-4 py-2 rounded-full text-xs font-bold backdrop-blur-md flex items-center gap-2" style="top: calc(env(safe-area-inset-top) + 20px);" x-cloak x-transition>
        <i class="ph-bold ph-check-circle text-green-400"></i> <span x-text="toastText"></span>
    </div>

    <button @click="openChat()" class="fixed bottom-6 right-6 z-[5000] w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full shadow-xl flex items-center justify-center text-white active:scale-90 transition-transform border-4 border-white/20">
        <i class="ph-fill ph-robot text-2xl"></i>
    </button>

    <div x-show="showChatModal" x-cloak class="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm" @click.self="showChatModal = false">
        <div class="bg-white w-full h-[90vh] max-w-md rounded-3xl shadow-2xl relative flex flex-col overflow-hidden">
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600"><i class="ph-fill ph-robot"></i></div>
                    <div class="font-bold text-slate-800 text-sm">Sakura Bot</div>
                </div>
                <div class="flex gap-2">
                    <button @click="showKeySettings = !showKeySettings" class="p-2 text-slate-400"><i class="ph-bold ph-gear"></i></button>
                    <button @click="showChatModal = false" class="p-2 text-slate-400"><i class="ph-bold ph-x"></i></button>
                </div>
            </div>
            <div x-show="showKeySettings || !apiKey" class="bg-slate-100 p-4 border-b border-slate-200">
                <label class="text-xs font-bold text-slate-500 mb-1">Gemini API Key</label>
                <input type="text" x-model="apiKeyTemp" class="w-full rounded-lg border border-slate-300 p-2 text-xs mb-3 bg-white outline-none">
                <button @click="saveSettings()" class="bg-indigo-500 text-white text-xs font-bold px-3 py-3 rounded-lg w-full">儲存設定</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-white flex flex-col" id="chatContainer">
                <template x-for="msg in chatHistory"><div class="flex flex-col w-full mb-4"><div class="chat-bubble shadow-sm markdown-body" :class="msg.role === 'user' ? 'chat-user' : 'chat-ai'" x-html="renderMarkdown(msg.content)"></div></div></template>
                <div x-show="isAiThinking" class="chat-bubble chat-ai w-16 flex items-center justify-center"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
            </div>
            <div class="p-3 bg-slate-50 border-t border-slate-100 flex gap-2">
                <input type="text" x-model="chatInput" @keydown.enter="sendChat()" placeholder="問問行程..." class="flex-1 bg-white border rounded-full px-4 py-2 text-sm outline-none">
                <button @click="sendChat()" class="w-10 h-10 bg-indigo-500 rounded-full text-white flex items-center justify-center"><i class="ph-bold ph-paper-plane-right"></i></button>
            </div>
        </div>
    </div>

    <header class="glass-nav">
        <div class="px-4">
            <div class="flex justify-between items-center mb-4">
                <div><h1 class="text-xl font-bold text-slate-800">2026 東京賞櫻 🌸</h1></div>
                <div class="bg-slate-50 border border-slate-200 rounded-2xl px-3 py-1.5 flex items-center gap-2">
                    <i :class="getCurrentWeather().icon + ' text-xl text-sky-500'"></i>
                    <div class="text-sm font-bold text-slate-800" x-text="getCurrentWeather().temp"></div>
                </div>
            </div>
            <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-2" id="tabContainer">
                <button @click="slideTo(0)" id="tab-0" class="tab-btn flex-shrink-0" :class="activeIndex === 0 ? 'tab-active' : 'tab-inactive'">行前</button>
                <button @click="slideTo(1)" id="tab-1" class="tab-btn flex-shrink-0" :class="activeIndex === 1 ? 'tab-active' : 'tab-inactive'">資訊</button>
                <button @click="slideTo(2)" id="tab-2" class="tab-btn flex-shrink-0" :class="activeIndex === 2 ? 'tab-active' : 'tab-inactive'">記帳</button>
                <template x-for="(day, index) in days" :key="index">
                    <button @click="slideTo(index + 3)" :id="'tab-' + (index + 3)" class="tab-btn flex-shrink-0" :class="activeIndex === (index + 3) ? 'tab-active' : 'tab-inactive'"><span x-text="day.shortTitle"></span></button>
                </template>
            </div>
        </div>
    </header>

    <main>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide px-4">
                    <h3 class="text-sm font-bold text-slate-400 mb-3">必備預約</h3>
                    <template x-for="ticket in prepData.tickets"><div class="ios-card p-4 flex justify-between items-center"><div><div class="font-bold text-slate-800" x-text="ticket.name"></div><div class="text-xs text-slate-400" x-text="ticket.desc"></div></div><a :href="ticket.link" target="_blank" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full text-xs font-bold">預約</a></div></template>
                    <div class="flex justify-between items-end mb-3"><h3 class="text-sm font-bold text-orange-400">🇯🇵 必買清單</h3><button @click="openAddModal()" class="text-xs font-bold text-white bg-orange-400 px-3 py-1 rounded-full">+ 新增</button></div>
                    <div class="ios-card overflow-hidden"><template x-for="(items, category) in prepData.shopping"><div x-show="items.length > 0"><div class="bg-gray-50 px-4 py-2 text-[10px] font-bold text-slate-400 uppercase" x-text="category"></div><template x-for="(item, idx) in items"><div @click="toggleCheck(item)" class="flex items-center justify-between px-4 py-3 border-b border-gray-50"><div class="flex items-center gap-3"><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center" :class="item.checked ? 'bg-orange-400 border-orange-400' : 'border-gray-300'"><i x-show="item.checked" class="ph-bold ph-check text-white text-sm"></i></div><span :class="item.checked ? 'line-through text-slate-300' : 'text-slate-700'" class="text-sm font-bold" x-text="item.name"></span></div><button @click.stop="deleteItem(category, idx)" class="text-slate-300 p-2"><i class="ph-bold ph-trash"></i></button></div></template></div></template></div>
                </div>

                <div class="swiper-slide px-4">
                    <div class="ios-card p-4 mb-6 bg-slate-800 text-white"><h3 class="font-bold mb-4">票券收納夾</h3><div class="space-y-3"><template x-for="(val, key) in prepData.ticketsWallet"><div class="bg-slate-700/50 rounded-xl p-3 flex justify-between items-center"><div class="flex-1"><div class="text-[10px] text-slate-400 uppercase font-bold" x-text="key"></div><input type="text" x-model="prepData.ticketsWallet[key]" @change="saveChecks()" class="bg-transparent w-full text-sm font-bold outline-none text-white"></div><button @click="copyToClipboard(prepData.ticketsWallet[key])" class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center"><i class="ph-bold ph-copy"></i></button></div></template></div></div>
                    
                    <div class="ios-card p-4">
                        <div class="flex items-center gap-2 mb-4"><i class="ph-fill ph-translate text-pink-500 text-xl"></i><h3 class="font-bold text-slate-800">手指日文</h3></div>
                        <div class="flex bg-slate-100 rounded-lg p-1 mb-4">
                            <button @click="phraseTab = 'food'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'food' ? 'bg-white shadow text-slate-800' : 'text-slate-400'">餐廳</button>
                            <button @click="phraseTab = 'shop'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'shop' ? 'bg-white shadow text-slate-800' : 'text-slate-400'">購物</button>
                            <button @click="phraseTab = 'help'" class="flex-1 py-1.5 rounded-md text-xs font-bold" :class="phraseTab === 'help' ? 'bg-white shadow text-red-500' : 'text-slate-400'">緊急</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <template x-for="p in phrases[phraseTab]">
                                <div @click="openPhrase(p, phraseTab)" class="phrase-card bg-gray-50 border border-gray-100 rounded-xl p-3 active:scale-95 transition-transform text-center z-10">
                                    <div class="text-sm font-bold text-slate-800" x-text="p.jp"></div>
                                    <div class="text-[10px] text-slate-500 mt-1 flex justify-center items-center gap-1"><span x-text="p.cn"></span> <i class="ph-bold ph-speaker-high text-pink-400"></i></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="swiper-slide px-4">
                    <div class="ios-card bg-slate-800 text-white p-6 mb-6 shadow-xl relative"><div class="text-xs text-slate-400 mb-1 font-bold">總花費 (日幣)</div><div class="text-4xl font-black mb-2">¥ <span x-text="totalSpent.toLocaleString()"></span></div><button @click="showMoneyModal = true" class="absolute bottom-4 right-4 bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i class="ph-bold ph-plus"></i></button></div>
                    <div class="space-y-3"><template x-for="(item, idx) in moneyList"><div class="ios-card p-3 flex justify-between items-center"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full flex items-center justify-center text-lg" :class="getMoneyIcon(item.cat).bg"><i :class="getMoneyIcon(item.cat).icon"></i></div><div><div class="font-bold text-slate-800 text-sm" x-text="item.title"></div><div class="text-[10px] text-slate-400" x-text="item.date"></div></div></div><div class="font-bold font-mono text-slate-800">¥<span x-text="Number(item.amount).toLocaleString()"></span></div></div></template></div>
                </div>

                <template x-for="(day, index) in days" :key="index">
                    <div class="swiper-slide px-4">
                        <div class="ios-card p-4 text-center mb-4"><h2 class="text-lg font-bold text-slate-800" x-text="day.title"></h2></div>
                        <div class="relative pl-4">
                            <div class="timeline-line"></div>
                            <div class="space-y-6">
                                <template x-for="(event, eIdx) in (day.hasOptions ? day.options[day.selectedOption] : day.events)" :key="event.time">
                                    <div class="relative pl-10" x-data="{ expanded: false }">
                                        <div class="absolute left-0 top-0 flex flex-col items-center z-10"><div class="w-12 h-12 rounded-full border-4 border-[#F2F2F7] flex items-center justify-center shadow-sm" :class="getIconColor(event.type)"><i :class="getIconClass(event.type) + ' text-white text-lg'"></i></div></div>
                                        <div class="ios-card overflow-hidden">
                                            <div class="p-4" @click="expanded = !expanded; $nextTick(() => updateSwiperHeight())">
                                                <div class="flex items-center gap-2 mb-1"><span class="text-xs font-black text-slate-300 font-mono" x-text="event.time"></span><template x-if="event.tag"><span class="text-[10px] font-bold px-2 py-0.5 rounded-full" :class="getTagColor(event.tag)" x-text="event.tag"></span></template></div>
                                                <h3 class="text-lg font-bold text-slate-800 mb-1" x-text="event.name"></h3>
                                                <p class="text-sm text-slate-500" x-text="event.desc"></p>
                                                <div class="flex justify-center mt-2" x-show="event.transportDetail || event.restaurants || event.luggageInfo"><i class="ph-bold ph-caret-down text-slate-300 transition-transform" :class="{'rotate-180': expanded}"></i></div>
                                            </div>
                                            <div class="expand-content" :class="{'expanded': expanded}">
                                                <div class="p-4 space-y-4">
                                                    <template x-if="event.luggageInfo"><div class="bg-yellow-50 p-3 rounded-xl text-xs">🧳 <strong>攻略：</strong> <span x-text="event.luggageInfo.summary"></span></div></template>
                                                    <template x-if="event.transportDetail"><div class="bg-blue-50 p-3 rounded-xl text-xs leading-6" x-html="event.transportDetail"></div></template>
                                                    <template x-if="event.restaurants"><div class="space-y-2"><template x-for="rest in event.restaurants"><div class="bg-white border p-3 rounded-xl flex justify-between items-center"><div class="text-xs font-bold" x-text="rest.name"></div><a :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(rest.name)" target="_blank" class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500"><i class="ph-fill ph-navigation-arrow"></i></a></div></template></div></template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="modalOpen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/60 p-6 backdrop-blur-sm" style="display:none;" @click.self="modalOpen = false">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl relative">
            <button @click="modalOpen = false" class="absolute top-4 right-4 p-2"><i class="ph-bold ph-x text-lg"></i></button>
            <span class="inline-block bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-xs font-bold mb-4" x-text="currentPhrase.cat"></span>
            <h2 class="text-3xl font-bold text-slate-800 mb-2" x-text="currentPhrase.jp"></h2>
            <p class="text-slate-400 text-sm mb-6" x-text="currentPhrase.romaji"></p>
            <p class="text-xl font-bold text-slate-600 mb-6" x-text="currentPhrase.cn"></p>
            <button @click="speak(currentPhrase.jp)" class="w-full bg-slate-100 text-slate-600 font-bold py-4 rounded-xl flex items-center justify-center gap-2"><i class="ph-fill ph-speaker-high text-xl"></i> 唸給對方聽</button>
        </div>
    </div>

    <div x-show="showAddModal" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/60 p-6 backdrop-blur-sm" style="display:none;" @click.self="showAddModal = false">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl relative">
            <div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">新增購物</h3><button @click="showAddModal = false"><i class="ph-bold ph-x"></i></button></div>
            <div class="space-y-4">
                <select x-model="newItem.cat" class="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold outline-none"><template x-for="(items, category) in prepData.shopping" :key="category"><option :value="category" x-text="category"></option></template></select>
                <input x-model="newItem.name" type="text" class="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold outline-none" placeholder="商品名稱">
                <button @click="addItem()" class="w-full bg-orange-400 text-white font-bold py-4 rounded-xl shadow-lg">確認新增</button>
            </div>
        </div>
    </div>

    <div x-show="showMoneyModal" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/60 p-6 backdrop-blur-sm" style="display:none;" @click.self="showMoneyModal = false">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl relative">
            <div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold text-slate-800">記一筆 💸</h3><button @click="showMoneyModal = false"><i class="ph-bold ph-x"></i></button></div>
            <div class="space-y-4">
                <input x-model="newMoney.title" type="text" placeholder="名稱" class="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold outline-none">
                <input x-model="newMoney.amount" type="number" placeholder="金額 (日幣)" class="w-full bg-slate-50 p-3 rounded-xl text-lg font-bold outline-none">
                <div class="grid grid-cols-2 gap-2"><button @click="newMoney.cat = 'food'" class="py-2 rounded-lg text-xs font-bold border" :class="newMoney.cat === 'food' ? 'bg-orange-100 border-orange-400' : 'bg-white'">飲食</button><button @click="newMoney.cat = 'shop'" class="py-2 rounded-lg text-xs font-bold border" :class="newMoney.cat === 'shop' ? 'bg-pink-100 border-pink-400' : 'bg-white'">購物</button></div>
                <button @click="addMoney()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md">儲存</button>
            </div>
        </div>
    </div>

    <script>
    const TOKYO_DAYS = [
        { "shortTitle": "D1 3/14", "title": "Day 1: 新宿之夜", "hotel": "APA Hotel Shinjuku-Gyoemmae", "events": [ { "time": "14:55", "type": "flight", "name": "抵達成田機場", "desc": "JL0802 降落 T2。", "location": "Narita Airport T2" }, { "time": "16:20", "type": "transport", "name": "前往市區", "desc": "搭乘 N'EX 成田特快直達新宿。", "location": "JR Shinjuku Station", "transportDetail": "🔹路線：成田機場 T2 ➔ 新宿站 (JR)<br>🔹時間：約 80 分鐘 (直達)<br>🔹月台：跟著「JR線」紅色指標走，通常在 B1。", "luggageInfo": { "summary": "推薦走「新南改札」搭計程車，全程有電梯！", "steps": [{ "text": "N'EX 下車後，月台上有電梯直達「新南改札」。" }] } }, { "time": "18:15", "type": "hotel", "name": "Check-in", "desc": "飯店 Check-in。", "location": "APA Hotel Shinjuku-Gyoemmae" }, { "time": "19:00", "type": "food", "name": "新宿晚餐", "desc": "第一晚吃好點！", "location": "Shinjuku", "tag": "推薦", "restaurants": [ { "name": "Udon Shin (慎)", "dish": "烏龍麵" }, { "name": "敘敘苑", "dish": "燒肉" } ] } ] },
        { "shortTitle": "D2 3/15", "title": "Day 2: 箱根溫泉", "hotel": "Hakone Mizunoto", "events": [ { "time": "09:00", "type": "transport", "name": "新宿出發", "desc": "浪漫特快前往箱根。", "location": "Shinjuku Station", "tag": "需預約", "luggageInfo": { "summary": "請搭計程車至「新宿西口地上改札」。" } }, { "time": "11:30", "type": "food", "name": "強羅午餐", "desc": "豆腐豬排煮。", "location": "Gora", "restaurants": [{"name":"田村銀勝亭"}] }, { "time": "16:30", "type": "hotel", "name": "溫泉 Check-in", "desc": "享受一泊二食。", "location": "Hakone Mizunoto" } ] },
        { "shortTitle": "D3 3/16", "title": "Day 3: 海盜船", "hotel": "APA Otsuka", "events": [ { "time": "09:30", "type": "activity", "name": "大涌谷", "desc": "看富士山吃黑蛋。", "location": "Owakudani" }, { "time": "11:00", "type": "activity", "name": "海盜船", "desc": "遊蘆之湖。", "location": "Togendai" }, { "time": "18:30", "type": "food", "name": "大塚晚餐", "desc": "Onigiri Bongo 飯糰。", "location": "Otsuka", "tag": "必吃", "restaurants": [ { "name": "Onigiri Bongo" } ] } ] },
        { "shortTitle": "D4 3/17", "title": "Day 4: 澀谷", "hotel": "APA Otsuka", "events": [ { "time": "11:00", "type": "activity", "name": "原宿逛街", "desc": "表參道。", "location": "Harajuku" }, { "time": "14:30", "type": "activity", "name": "SHIBUYA SKY", "desc": "展望台 (需預約)。", "location": "SHIBUYA SKY", "tag": "需預約" }, { "time": "17:00", "type": "food", "name": "Yoroniku", "desc": "南青山燒肉。", "location": "Yoroniku", "tag": "需搶位" } ] },

    function tripData() {
        const defaultPrepData = { ticketsWallet: { 'Skyliner': '', 'VJW': '' }, tickets: [ { name: 'N\'EX', desc: '機場 ➔ 新宿', link: '#' }, { name: '箱根周遊券', desc: '2日券', link: '#' } ], shopping: { '藥妝': [], '零食': [] }, luggage: { '證件': [{ name: '護照', checked: false }] } };
        let initialData = defaultPrepData;
        try { const s = localStorage.getItem('tokyo_v8'); if(s) initialData = JSON.parse(s); } catch(e){}

        return {
            activeIndex: 0, showChatModal: false, showKeySettings: false, swiperInstance: null,
            apiKey: localStorage.getItem('gemini_key') || '', apiKeyTemp: '', chatInput: '', isAiThinking: false,
            modelId: localStorage.getItem('gemini_model') || 'gemini-2.5-flash', modelIdTemp: '',
            availableModels: [], chatHistory: [],
            prepData: initialData, moneyList: [], days: TOKYO_DAYS, 
            weatherData: { tokyo: { temp: '20°C', icon: 'ph-sun' } },
            toastText: '', showToast: false, modalOpen: false, showAddModal: false, showMoneyModal: false,
            currentPhrase: { jp: '', cn: '', romaji: '', cat: '' }, newItem: { cat: '藥妝', name: '' }, newMoney: { title: '', amount: '', cat: 'food' },
            phraseTab: 'food',
            phrases: { food: [ { jp: 'メニューをください', cn: '請給我菜單', romaji: 'Menyuu o kudasai' }, { jp: 'お会計お願いします', cn: '買單', romaji: 'Okaikei onegaishimasu' } ], shop: [ { jp: 'いくらですか？', cn: '請問多少錢？', romaji: 'Ikura desuka?' } ], help: [ { jp: 'トイレはどこ？', cn: '廁所在哪？', romaji: 'Toire wa doko?' } ] },

            get totalSpent() { return this.moneyList.reduce((acc, item) => acc + Number(item.amount), 0); },

            initApp() { 
                this.modelIdTemp = this.modelId; this.apiKeyTemp = this.apiKey;
                setTimeout(() => {
                    this.swiperInstance = new Swiper(".mySwiper", { 
                        autoHeight: true, spaceBetween: 20, observer: true, observeParents: true,
                        on: { slideChange: (s) => { this.activeIndex = s.activeIndex; this.centerTab(s.activeIndex); } } 
                    });
                }, 500); 
            },

            centerTab(index) {
                const container = document.getElementById('tabContainer');
                const tabBtn = document.getElementById(`tab-${index}`);
                if (container && tabBtn) { container.scrollTo({ left: tabBtn.offsetLeft - (container.clientWidth / 2) + (tabBtn.clientWidth / 2), behavior: 'smooth' }); }
            },

            speak(text) { 
                if ('speechSynthesis' in window) { 
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP'; u.rate = 0.9;
                    window.speechSynthesis.speak(u); 
                } 
            },

            openPhrase(p, catName) { 
                const catMap = { 'food': '餐廳', 'shop': '購物', 'help': '緊急' };
                this.currentPhrase = { ...p, cat: catMap[catName] };
                this.modalOpen = true; 
            },

            saveSettings() {
                localStorage.setItem('gemini_key', this.apiKey = this.apiKeyTemp);
                localStorage.setItem('gemini_model', this.modelId = this.modelIdTemp);
                this.showKeySettings = false; this.toast('設定已儲存');
            },

            async sendChat() {
                if(!this.chatInput.trim()) return;
                const userMsg = this.chatInput; this.chatInput = '';
                this.chatHistory.push({ role: 'user', content: userMsg });
                this.isAiThinking = true;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${this.modelId}:generateContent?key=${this.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: `你是東京導遊。問：${userMsg}` }] }] })
                    });
                    const data = await res.json();
                    this.chatHistory.push({ role: 'ai', content: data.candidates[0].content.parts[0].text });
                } catch (e) { this.chatHistory.push({ role: 'ai', content: '錯誤: ' + e.message }); }
                finally { this.isAiThinking = false; this.$nextTick(() => { const c = document.getElementById('chatContainer'); c.scrollTop = c.scrollHeight; }); }
            },

            slideTo(i) { this.swiperInstance.slideTo(i); },
            updateSwiperHeight() { setTimeout(() => { this.swiperInstance.updateAutoHeight(); }, 100); },
            toggleCheck(item) { item.checked = !item.checked; this.saveChecks(); },
            saveChecks() { localStorage.setItem('tokyo_v8', JSON.stringify(this.prepData)); },
            addItem() { this.prepData.shopping[this.newItem.cat].push({ name: this.newItem.name, checked: false }); this.saveChecks(); this.showAddModal = false; },
            deleteItem(cat, idx) { this.prepData.shopping[cat].splice(idx, 1); this.saveChecks(); },
            addMoney() { this.moneyList.unshift({ title: this.newMoney.title, amount: this.newMoney.amount, cat: this.newMoney.cat, date: '今日' }); this.showMoneyModal = false; },
            toast(t) { this.toastText = t; this.showToast = true; setTimeout(() => this.showToast = false, 2000); },
            getCurrentWeather() { return this.weatherData.tokyo; },
            getIconColor(t) { const c = { 'transport': 'bg-blue-500', 'food': 'bg-orange-400', 'activity': 'bg-slate-700', 'sakura': 'bg-pink-400', 'hotel': 'bg-indigo-500', 'flight': 'bg-sky-500' }; return c[t] || 'bg-slate-400'; },
            getIconClass(t) { const i = { 'transport': 'ph-bold ph-train', 'food': 'ph-bold ph-bowl-food', 'activity': 'ph-bold ph-camera', 'sakura': 'ph-fill ph-flower-lotus', 'hotel': 'ph-bold ph-bed', 'flight': 'ph-bold ph-airplane-tilt' }; return i[t] || 'ph-circle'; },
            getTagColor(t) { if(t==='需預約')return 'bg-red-100 text-red-600'; if(t==='必吃')return 'bg-orange-100 text-orange-600'; return 'bg-blue-100 text-blue-600'; },
            copyToClipboard(text) { navigator.clipboard.writeText(text); this.toast('已複製'); },
            renderMarkdown(text) { return marked.parse(text); },
            openTaxi(event) { if (event.taxi) { this.currentTaxi = event.taxi; this.showTaxiModal = true; } },
            startClock() {},
            enableSimulateMode() {},
            isCurrentEvent() { return false; },
            autoNavigate() {},
            resetData() {},
            checkModels() { this.availableModels = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro']; }
        }
    }
    </script>
